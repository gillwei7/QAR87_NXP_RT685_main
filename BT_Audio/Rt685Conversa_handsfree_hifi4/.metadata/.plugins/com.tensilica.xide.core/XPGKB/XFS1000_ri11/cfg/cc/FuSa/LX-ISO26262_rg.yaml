# this file has rules specific to ISO-26262 (only applicable to RG release)
_templates:
- &nonfusacoproc
  [ hifi3z, hifi4, hifi5, cx_bbep64, fsn, fpmlx_128, cx_bbep16, pdx8 ]
    
options:   
  - flixedcore570:
      bdeps: [ flix3_570_fc ]                
  - udma:
      bsdeps: { udma_data_width: '0:128' }  
  - debugEnabled:
      bdeps: [ ocd, breakInBreakOut ]  
      mindeps: { dataTraps: '2-2', instTraps: '2-2' }    
  - fusa_iso26262:
      bdeps: [ clamps, implCgGlobal, implCgFunctionalUnit, scan, nsa, minMax, sext, density, brs, prid,
               tieArbitraryByteEnable, loops, sync, pif.arb.byte.enable, debugEnabled, trace, vectorsReloc ]
      bcons: [ condStoreSync, pifAsync, udma_reorder_buffer, *nonfusacoproc ]
      bsdeps: { tempMul32: 'none:full:fullupper', pso.domains: 'None:Core_Debug_Mem',
                pso.core.ret: 'None:Full', mmuType: IMMU, tempBus: axi4, cfg_vector_style: 'lx5_sysram:lx2_rel',
                instWidthBytes: '3:4:8:12:16' }
      mindeps: { traxMemBytes: '1024-32768', pifWidthBits: '32-128' }   
      exprdeps:
      - [ [ 'model:lmem[memName:=instram.0].sizeBytes==0' ],
          [ 'model:lmem[memName:=instram.0].sizeBytes>32767', 'model:lmem[memName:=instram.0].sizeBytes<262145' ],
          [ 'E: Selection of <FuSa> requires that <Instruction RAM 0> is either unselected or has values 32K, 64K, 128K, 256K' ] ]  
      - [ [ 'model:lmem[memName:=instram.1].sizeBytes==0' ],
          [ 'model:lmem[memName:=instram.1].sizeBytes>32767', 'model:lmem[memName:=instram.1].sizeBytes<262145' ],
          [ 'E: Selection of <FuSa> requires that <Instruction RAM 1> is either unselected or has values 32K, 64K, 128K, 256K' ] ]                                                                                                            
                                                                         