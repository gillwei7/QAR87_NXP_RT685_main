# this files lists all the overlay rules that we want to fire on top of the basic config rules. 

ovrules:
# generic fusa fules, applicable to everyone and all releases
- ISO26262: 
    rulesfile: FuSa/LX-ISO26262.yaml  # the yaml file which has all the rules
    featDef: { n: fusa_iso26262, name: 'FuSa Account', overrideOpts: true, showInLogin: true, opts: 'fusa_iso26262' } # the feature which controls these rules
    nofeatfire: true        # default false    
    tag: FuSa               # the tag in problems view that will be shown when this rule layer fires any rule.
    editordisplay: true     # if set to true this value will be evaluated and displayed in config editor.
    graphedEditor: true     # default false, when set to true the editor will render option as defined in the rulesfile   
    exprdeps:               # additional check which decides if the rule should be fired.
      - [ [ 'fusa_iso26262==1' ] ]   
#
#
#
# ASIL-B fusa rules when flexlock is not selected     
- ISO26262_ASILB: 
    rulesfile: FuSa/LX-ISO26262_ASIL_B.yaml 
    featDef: { n: fusa_iso26262, name: FuSa, overrideOpts: false, showInLogin: false, opts: 'fusa_iso26262' } 
    nofeatfire: true        
    tag: FuSa               
    editordisplay: false     
    exprdeps:               
      - [ [ 'fusa_iso26262==1','_dcls_without_lockonly_lockstep==1','fusa_compliance_type==20' ] ]  
#
#
#
# ASIL-B fusa rules where flex lock is selected    
- ISO26262_ASILB_FL:
    rulesfile: FuSa/LX-ISO26262_ASIL_B_FL.yaml 
    featDef: { n: fusa_iso26262, name: FuSa, overrideOpts: false, showInLogin: false, opts: 'fusa_iso26262' } 
    nofeatfire: true        
    tag: FuSa               
    editordisplay: false     
    exprdeps:               
      - [ [ 'fusa_iso26262==1','_dcls_with_lockonly_lockstep==1','fusa_compliance_type==20' ] ]   
#
#
#
# ASIL-B fusa rules for RI.5 onwards
- ISO26262_ASILB_ri5: 
    rulesfile: FuSa/LX-ISO26262_ASIL_B_ri5_later.yaml  
    featDef: { n: fusa_iso26262, name: FuSa, overrideOpts: false, showInLogin: false, opts: 'fusa_iso26262' } 
    nofeatfire: true        
    tag: FuSa RI.5+               
    editordisplay: false     
    exprdeps:               
      - [ [ 'fusa_iso26262==1','bwisanver>=27100050','fusa_compliance_type==20' ],
          [ 'P:rel' ] ]       
#
#
#
# ASIL-D fusa rules      
- ISO26262_ASILD:
    rulesfile: FuSa/LX-ISO26262_ASIL_D.yaml 
    featDef: { n: fusa_iso26262, name: FuSa, overrideOpts: false, showInLogin: false, opts: 'fusa_iso26262' } 
    nofeatfire: true        
    tag: FuSa               
    editordisplay: false     
    exprdeps:               
      - [ [ 'fusa_iso26262==1','fusa_compliance_type==30' ] ]             
#
#
#
# fusa rules for RI.0           
- ISO26262_ri0: 
    rulesfile: FuSa/LX-ISO26262_ri0.yaml  
    featDef: { n: fusa_iso26262, name: FuSa, overrideOpts: false, showInLogin: false, opts: 'fusa_iso26262' } 
    nofeatfire: true        
    tag: FuSa RI.0               
    editordisplay: false     
    exprdeps:               
      - [ [ 'fusa_iso26262==1','bwisanver==27100000' ],
          [ 'P:rel' ] ]     
#
#
#
# fusa rules for RG5-RG8           
- ISO26262_rg: 
    rulesfile: FuSa/LX-ISO26262_rg.yaml  
    featDef: { n: fusa_iso26262, name: FuSa, overrideOpts: false, showInLogin: false, opts: 'fusa_iso26262' } 
    nofeatfire: true        
    tag: FuSa RG.5-RG.8               
    editordisplay: false     
    exprdeps:               
      - [ [ 'fusa_iso26262==1','bwisanver<=27000080' ],
          [ 'P:rel' ] ]       
#
#
#
#  LX8 rules    
- LX8_rules: 
    rulesfile: ovrules/LX8_rules.yaml  
    nofeatfire: true        
    tag: LX8             
    editordisplay: false     
    exprdeps:               
      - [ [ 'ctlisanver>=29000000' ] ]  
#
#
#
#  LX generic rules LX1-7
- LX_generic_rules: 
    rulesfile: ovrules/LX_1_TO_7_rules.yaml  
    nofeatfire: true        
    tag: LX             
    editordisplay: false     
    exprdeps:               
      - [ [ 'ctlisanver<29000000' ] ]                   
                                                      
