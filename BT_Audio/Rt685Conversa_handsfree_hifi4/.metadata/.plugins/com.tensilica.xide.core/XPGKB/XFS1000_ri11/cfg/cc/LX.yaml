  - prefetchEntries:
      n: Cache Prefetch Entries
      tt: |-
          Select >0 entries to include the cache prefetch unit
      t: int
      bdeps: [ 'dc.size' ]
      nat: HSV
      evalex: 
      - [ [ 'strcmp("${wizpage}","rel") && ${bwisanver}<9000000 && ${ic.size}==0' ],
          [ 'E:<${prefetchEntries}> requires that Instruction Cache is selected for this release' ] ]    
      - [ [ 'strcmp("${wizpage}","rel") && ${bwisanver}<9000000 && ${ic.lineSize}!=${dc.lineSize}' ],
          [ 'E:<${prefetchEntries}> requires that both Instruction and Data Cache line sizes are the same for this release' ] ]                  
      exprdeps:
      - [ [ 'dc.size==0' ],
          [ 'dc.lineSize>$dataWidthBits/8' ],
          [ 'bwisanver>=27100040', 'dc.lineSize>=$dataWidthBits/8', 'mmuType==IMMU', 'tempPipeLength>=7' ],
          [ 'bwisanver>=27100060', 'dc.lineSize>=$dataWidthBits/8', 'mmuType==LinuxMMU', 'tempPipeLength>=7', 'altPageSizes==1' ],
          [ 'bwisanver>=27100070', 'dc.lineSize>=$dataWidthBits/8', 'mmuType==LinuxMMU', 'tempPipeLength>=7' ],
          [ 'P:rel' ],
          [ 'E:Data cache line is not large enough for this DataWidth, PipeLength, Prefetch and MMU combination for this release' ] ]
      - [ [ 'ic.lineSize>$ic.widthBits/8' ],
          [ 'ic.lineSize!=$dc.lineSize' ],
          [ 'E:Prefetch requires that Instruction Cache line size is greater than the Instruction Cache width' ] ]
      pgr: 'Prefetch Options'
      p: [ ic.size, dc.size ]
      order: 0
      prodvar: true
      # never touch this DV EVER (see TENX-56934 which fixed and created regression TENX-57966)
      dv: 0
      # never touch this DV EVER
      isa:
      - { exist: false, hi: 799, lo: 0 }
      - { feat: prefetchBOR, hi: 902, lo: 800, rangepo2: { hi: 3, inczero: true, lo: 3  } }
      - { feat: prefetch, hi: 999, lo: 903, rangepo2: { hi: 4, inczero: true, lo: 3  } }
      - { hi: 99999, lo: 1000, rangepo2: { hi: 4, inczero: true, lo: 3  } }
