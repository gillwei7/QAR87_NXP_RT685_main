           [ 'E:<${nna_engine}> requires that <${ivp26_quadmac}> is selected.' ] ]    
       - [ [ '${visionp1}==1 && ${vp1_quad_mac_8x8}==0' ],
           [ 'E:<${nna_engine}> requires that <${vp1_quad_mac_8x8}> is selected.' ] ]            
      exprdeps:
       - [ [ 'model:int[extIntRevIndex:=0].typeId==level' , 'model:int[extIntRevIndex:=1].typeId==level', 'intCount>=0' ],
           [ 'E:<${nna_engine}> requires that the two highest numbered external interrupts are Level interrupts' ] ]      
       - [ [ 'ext_intcount>2', 'model:int[index:=0].index==0', 'intCount>=0' ],
           [ 'E:<${nna_engine}> requires that at least 3 external interrupts are configured' ] ]  
       - [ [ 'model:lmem[memName:=dataram.0].sizeBytes>=65536' ],
           [ 'E:<${nna_engine}> requires that DataRAMs are at least 64KB' ] ]
       - [ [ 'model:lmem[memName:=dataram.1].sizeBytes>=65536' ],
           [ 'E:<${nna_engine}> requires that both DataRAMs are at least 64KB' ] ]                         
       - [ [ 'model:lmem[memName:=dataram.0].dma==1' ],
           [ 'E:<${nna_engine}> requires that DataRAMs are configured with Inbound access' ] ]
       - [ [ 'model:lmem[memName:=dataram.0].pAddrEnd==model:lmem[memName:=dataram.1].pAddr'],
           [ 'model:lmem[memName:=dataram.1].pAddrEnd==model:lmem[memName:=dataram.0].pAddr'],
           [ 'E:<${nna_engine}> requires that DRam0 and DRam1 abut each other.' ] ]                                                                    
      t: int
      nat: HS
      pgr: 'AI Max/DNA'
      p: [ ivp26_32, visionp1 ]
      dv: 0
      order: 100
      isa:
      - { hi: 27100_06_9, lo: 0, exist: false }
      - { hi: 27100_06_9, lo: 27100_04_0, choice: [ [ 0, 'Not Configured' ], [ 10, 'DNA150' ] ], feat: 'dna150' }
#      in case there is a plan to support 2 sblk DNA150
#      - { hi: 27100_06_9, lo: 27100_04_0, choice: [ [ 0, 'Not Configured' ], [ 10, 'DNA150' ], [ 15, 'DNA150 2 SBLKs' ] ], feat: 'dna150' }
      - { hi: 27100_07_9, lo: 27100_07_0, choice: [ [ 0, 'Not Configured' ], [ 20, 'NNA110' ] ], feat: 'nna110_ri7' }  
      - { hi: 27199_99_9, lo: 27100_08_0, choice: [ [ 0, 'Not Configured' ], [ 20, 'NNA110' ] ], feat: 'nna110' }  
      - { hi: 27199_99_9, lo: 27100_08_0, choice: [ [ 0, 'Not Configured' ], [ 10, 'DNA150' ], [ 20, 'NNA110' ] ], feat: 'dna150+nna110' }
        # conti in LX-ext.yaml...    
  - nne_engine:
      n: NNE Selection
      bdeps: [ udma, implasyncreset, dynamic_way_disable, debugAPB, pifWriteResp ]
      mindeps: { +ic.size: 32768, intCount: 7 }
      bsdeps: { pso.domains: None, udma_data_width: '0:128', axi_ecc: 'none', pifWidthBits: 128, mmuType: IMMU }
      bcons: [ pifAsync, *all_ai_engines, axi_acelite, axi_sec_interface, flexlock ]      
      jsrules: [ int~pifWriteResp ]    
      evalex:
      - [ [ '${hifi5}>0 && ${hifi5_nn_mac}==0' ],
          [ 'E:<${hifi5}> with <${nne_engine}> requires that <${hifi5_nn_mac}> is selected' ] ]  
      - [ [ '${hifi5}>0 && ${hifi5_sigtanh}==0' ],
          [ 'E:<${hifi5}> with <${nne_engine}> requires that <${hifi5_sigtanh}> is selected' ] ]    
      - [ [ '${hifi_le}>0 && ${hifi_le_sigtanh}==0' ],
          [ 'E:<${hifi_le}> with <${nne_engine}> requires that <${hifi_le_sigtanh}> is selected' ] ] 
      - [ [ '${hifi3z}>0 && ${hifi3z_sigtanh}==0' ],
          [ 'E:<${hifi3z}> with <${nne_engine}> requires that <${hifi3z_sigtanh}> is selected' ] ]                     
      - [ [ '${hifi4}>0 && ${hifi4_sigtanh}==0' ],
          [ 'E:<${hifi4}> with <${nne_engine}> requires that <${hifi4_sigtanh}> is selected' ] ]   
      - [ [ '${hifi4}>0 && ${dataWidthBits}<128' ],             
          [ 'E:<${hifi4}> with <${nne_engine}> requires that <${dataWidthBits}> is atleast 128b' ] ]                                          
      exprdeps:
       - [ [ 'model:int[extIntRevIndex:=0].typeId==level' , 'model:int[extIntRevIndex:=1].typeId==level', 'intCount>=0' ],
           [ 'E:NNE requires that the two highest numbered external interrupts are Level interrupts' ] ]      
       - [ [ 'ext_intcount>2', 'model:int[index:=0].index==0', 'intCount>=0' ],
           [ 'E:NNE requires that at least 3 external interrupts are configured' ] ]  
       - [ [ 'model:lmem[memName:=dataram.0].sizeBytes>=65536' ],
           [ 'E:NNE requires DataRAM 0 is at least 64KB' ] ]
       - [ [ 'model:lmem[memName:=dataram.1].sizeBytes==0' ],
           [ 'model:lmem[memName:=dataram.1].sizeBytes>=65536' ],
           [ 'E:NNE requires that DataRAM 1 (if configured) is at least 64KB' ] ] 
       - [ [ 'model:lmem[memName:=instram.0].sizeBytes==0' ],
           [ 'model:lmem[memName:=instram.0].sizeBytes>=32768' ],
           [ 'E:NNE requires that Instruction Ram 0 (if configured) is at least 32KB' ] ]
       - [ [ 'model:lmem[memName:=instram.1].sizeBytes==0' ],
           [ 'model:lmem[memName:=instram.1].sizeBytes>=32768' ],
           [ 'E:NNE requires that Instruction RAM 1 (if configured) is at least 32KB' ] ]
       - [ [ 'model:lmem[memName:=dataram.0].dma==1' ],
           [ 'E:NNE requires that DataRAMs are configured with Inbound access' ] ]
       - [ [ 'model:lmem[memName:=dataram.1].sizeBytes==0' ],
           [ 'model:lmem[memName:=dataram.0].pAddrEnd==model:lmem[memName:=dataram.1].pAddr'],
           [ 'model:lmem[memName:=dataram.1].pAddrEnd==model:lmem[memName:=dataram.0].pAddr'],
           [ 'E:<${nne_engine}> requires that DRam0 and DRam1 abut each other.' ] ]
      t: int
      nat: HS
      pgr: 'AI Boost'
#      p: [ hifi4, hifi5 ]
      p: [ hifi4, hifi5, hifi_le, hifi3z ]
      dv: 0
      order: 100
      isa:
      - { hi: 27100_06_9, lo: 0, exist: false }
      - { hi: 27100_07_9, lo: 27100_07_0, choice: [ [ 0, 'Not Configured' ], [ 10, 'NNE110' ] ], feat: 'nne110_ri7' }  
      - { hi: 27199_99_9, lo: 27100_08_0, choice: [ [ 0, 'Not Configured' ], [ 10, 'NNE110' ] ], feat: 'nne110' }  
