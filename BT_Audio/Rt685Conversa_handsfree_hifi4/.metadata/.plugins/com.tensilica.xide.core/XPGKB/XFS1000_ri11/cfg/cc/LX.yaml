  debug:
  - debugEnabled:
      n: Debug
      tt: |-
          Select to enable debugging options
          Requires high priority interrupts
      mindeps: { debugIntLevel: 2, intCount: 1, intLevelCount: 2 }
      t: ibool
      exprdeps:
      - [ [ 'tempBus!=none' ],
          [ 'model:lmem[memName:=instram.0].sizeBytes>=8192' ],
          [ 'model:lmem[memName:=instram.1].sizeBytes>=8192' ],
          [ 'model:lmem[memName:=instrom.0].sizeBytes>=8192' ],
          [ 'E:No system interface with less than 8K Instruction Memory does not support Debug.' ] ] 
      nat: HSM
      pgr: 'Debug'
      order: 0
      isa:
      - { hi: 27199_99_9, lo: 0 }
      - { hi: 99999, lo: 29000_00_0, dv: 1 }
  - dataTraps:
      n: Count of HW data traps
      tt: |-
          Number of data address breakpoint registers
      bdeps: [ debugEnabled ]
      t: int
      nat: HS
      p: debugEnabled
      order: 120
      isa:
      - { hi: 99999, lo: 0, range: { hi: 2, lo: 0  } }
  - instTraps:
      n: Count of HW instruction traps
      tt: |-
          Number of instruction address breakpoint registers
      bdeps: [ debugEnabled ]
      t: int
      nat: HS
      p: debugEnabled
      order: 100
      isa:
      - { hi: 99999, lo: 0, range: { hi: 2, lo: 0  } }
  - ocd:
      n: On-chip debug
      tt: |-
          On-chip debug module with JTAG compatible interface
          Requires that Debug is enabled
      bdeps: [ debugEnabled ]
      t: ibool
      nat: HS
      p: debugEnabled
      order: 200
      isa:
      - { hi: 27199_99_9, lo: 0 }
      - { hi: 99999, lo: 29000_00_0, dv: 1 }
  - breakInBreakOut:
      n: Break-in Break-out
      tt: |-
          Add external debug interrupt at debug level (break-in/break-out)
          Requires that OCD is enabled
      bdeps: [ ocd ]
      t: ibool
      nat: HS
      p: debugEnabled
      order: 250
      isa:
      - {  hi: 99999, lo: 0 }
  - dirArray:
      n: DIRs
      tt: |-
          Use array of 4 Debug Instruction Registers (DIRs)
          Requires that OCD is enabled
      bdeps: [ ocd ]
      t: ibool
      nat: HS
      p: debugEnabled
      order: 300
      isa:
      - { hi: 999, lo: 0 }
      - { hi: 99999, lo: 1000, exist: false }
  - trace:
      n: Trace
      tt: |-
          Trace port (address trace and pipeline status)
      t: ibool
      nat: HS
      pgr: 'Trace port'
      isa:
      - { hi: 99999, lo: 0 }
  - dtrace:
      n: Data trace
      tt: |-
          Add data trace
          (requires Trace port)
      bdeps: [ trace ]
      t: ibool
      nat: HS
      p: trace
      isa:
      - { hi: 99999, lo: 0 }
  - scan:
      n: Full scan
      tt: |-
          Full scan
      t: ibool
      nat: HV
      pgr: 'Implementation'
      order: 400
      minmax: false
      prodvar: true
      isa:
      - { hi: 27199_99_9, lo: 0 }
      - { hi: 99999, lo: 29000_00_0, dv: 1 }
  - transparentLatches:
      n: Transparent latches
      tt: |-
          Add logic to make latches transparent
      bdeps: [ scan ]
      bsdeps: { implBlock: latch }
      t: ibool
      nat: HV
      p: scan
      minmax: false
      order: 450
      isa:
      - { hi: 899, lo: 0 }
      - { hi: 999, lo: 900, feat: latchesCW, nofeaturevis: false }
      - { hi: 99999, lo: 1000, feat: latchesNADA, nofeaturevis: false }
  - traxMemBytes:
      n: Trace memory size
      tt: |-
          Size of trace memory (bytes), or 0 for none
      bdeps: [ debugEnabled, trace, ocd, breakInBreakOut ]
      t: int
      nat: HV
      pgr: 'TRAX: Trace Buffer Module'
      order: 100
      isa:
      - { exist: false, hi: 709, lo: 0 }
      - { feat: TRAX, hi: 99999, lo: 710, minmax: false, rangepo2: { hi: 18, inczero: true, lo: 9  } }
  - debugAPB:
      n: APB Debug Access
      tt: |-
          Configure APB access to the Access Port module of the processor
      bdeps: [ debugEnabled, +ocd ]
      t: ibool
      nat: HV
      p: debugEnabled
      order: 400
      isa:
      - { exist: false, hi: 999, lo: 0 }
      - { hi: 99999, lo: 1000 }
  - debugLSDDR:
      n: Debug Load Store DDR
      t: ibool
      exist: false
  - traxTimestamps:
      n: TRAX timestamps
      tt: |-
          Enable TRAX timestamps
      bdeps: [ debugAPB, traxApbCtl ]
      t: ibool
      nat: HV
      p: traxMemBytes
      order: 200
      isa:
      - { exist: false, hi: 1207, lo: 0 }
      - { feat: trax_ts, hi: 1208, lo: 1208, nofeaturevis: false }
      - { hi: 99999, lo: 27000_09_0 }
  - traxTimewidth:
      n: TRAX timestamps time width selection
      tt: |-
          TRAX timestamps time width
      t: ibool
      nat: HV
      p: traxMemBytes
      exist: false
  - numRomPatchRegs:
      n: Number of registers for ROM patching
      t: int
      nat: HV
      pgr: 'Debug'
      dv: 0
      order: 410
      nofeaturevis: false
      isa:
      - { exist: false, hi: 27100_00_9, lo: 0 }
      - { hi: 27199_99_9, lo: 27100_01_0, choice: [ [ 0, 'None' ], [ 32, '32' ] ], feat: 'lx_rompatch' }
      - { hi: 99999, lo: 29000_00_0, exist: false }
  trax:
  - traxApbCtl:
      n: TRAX ATB Interface
      tt: |-
          Adds ATB data interface to the TRAX module
      bdeps: [ debugAPB, traxMemBytes ]
      t: ibool
      nat: HV
      p: traxMemBytes
      order: 120
      isa:
      - { exist: false, hi: 801, lo: 0 }
      - { feat: trax_apb_BOR, hi: 901, lo: 802 }
      - { feat: trax_apb_rd2, hi: 999, lo: 902 }
      - { hi: 99999, lo: 1000 }
  - traxMemShared:
      n: TRAX Memory Sharing
      tt: |-
          Provide ready signal and address range for TRAX memory so TRAX memories
          can be shared and can also make use of processor local memories
      bdeps: [ traxMemBytes ]
      t: ibool
      nat: HV
      p: traxMemBytes
      order: 140
      isa:
      - { exist: false, hi: 999, lo: 0 }
      - { hi: 99999, lo: 1000 }
  interrupt:
  - exceptionsEnabled:
      n: Enable Exceptions
      tt: |-
          Note that all current Xtensa processors have exceptions 
          enabled regardless of whether any specific 
          internal or external interrupts are configured 
      t: ibool
      nat: HSM
      dv: 1
      exist: false
  - debugIntLevel:
      n: Level of debug interrupt
      tt: |-
          Level of debug interrupt
          Must be a high-priority level and is
          typically the highest configured level (below NMI)
      t: int
      nat: HSM
      p: { p: intCount, d: 0 }
      order: 400
      exprdeps:
      - [ [ 'debugIntLevel<2' ],
          [ 'model:int[level:=debugIntLevel].level!=$debugIntLevel' ],
          [ 'E:Other interrupts cannot be assigned to debug interrupt level.' ] ]        
      isa:
      - { dv: 0, hi: 99999, lo: 0, range: { hi: 6, inczero: true, lo: 2  } }
  - execmIntLevel:
      n: EXCM level
      tt: |-
          Handlers for high-priority interrupts must typically be coded in assembler.
          Selecting the EXCM level to be >1 allows interrupts up to this priority to be coded in C
      t: int
      nat: HS
      p: { p: intCount, d: 1 }
      order: 500
      evalex:                
      - [ [ '${intCount}>0 && ${debugEnabled}>0 && ${execmIntLevel}>=${debugIntLevel}' ],
          [ 'E:<${execmIntLevel}> must be less than <${debugEnabled}>.' ] ]               
      isa:
      - { dv: 1, hi: 99999, lo: 0, range: { hi: 6, inczero: false, lo: 1  } }
  - intCount:
      n: Count of interrupts
      tt: |-
          Count of interrupts
      t: int
      nat: HS
      pgr: 'Interrupt Overview'
      order: 100
      isa:
      - { hi: 27199_99_9, lo: 0, range: { hi: 32, lo: 0  } }
      - { hi: 99999, lo: 29000_00_0, range: { hi: 128, lo: 0  } }
  - intLevelCount:
      n: Count of interrupt levels
      tt: |-
          Count of interrupt priority levels
          Level 1 is "low" level; levels 2-6 are "high-priority";
          NMI (if configured) is "above" the highest selected high-priority level
      t: int
      nat: HSM
      p: { p: intCount, d: 1 }
      order: 300
      exprdeps:
      - [ [ 'intLevelCount<2' ],
          [ 'model:int[level:=_nmi_int_level].typeId==nmi' ],
          [ 'E:Only NMI interrupt can be configured at NMI level.' ] ]       
      isa:
      - { dv: 1, hi: 99999, lo: 0, range: { hi: 6, lo: 1  } }
  - intTimerCount:
      n: Count of timers
      tt: |-
          Count of timers
      t: int
      nat: HS
      p: intCount
      jsrules: [ int ]
      order: 200
      isa:
      - { hi: 99999, lo: 0, range: { hi: 3, lo: 0  } }
  - intDistrib:
      n: Interrupt Distributor Interconnect
      tt: |-
          Interrupt Distributor Interconnect
      t: ibool
      nat: HS
      exist: false
  'interrupt/recs':
    t: interrupt
    pgr: 'Interrupt Details'
    fields: [ type, level ]
    isa:
    - { lo: 0, hi: 27199_99_9,
        recset: { name: int, reclo: 0, rechi: 31 } }
    - { lo: 29000_00_0, hi: 99999,
        recset: { name: int, reclo: 0, rechi: 127 } }        
  mmu:
  - mmuType:
      n: Memory management selection
      tt: |-
          Region protection options provide coarse protection at a low gate count
          The Full MMU provides resource management capabilities sufficient for running Linux
      t: str
      order: 50
      nat: HSM
      exprdeps:
      - [ [ 'F:!mpu_pif_lx' ],
          [ 'mmuType==IMMU', 'tempBus==axi4' ],
          [ 'mmuType!=IMMU' ],
          [ 'E:MPU requires that the Bus Bridge is AXI4' ] ]
      - [ [ 'F:mpu_pif_lx' ],
          [ 'mmuType==IMMU', 'tempBus==axi4' ],
          [ 'mmuType==IMMU', 'tempBus==pif' ],
          [ 'mmuType==IMMU', 'tempBus==none' ],
          [ 'mmuType!=IMMU' ],
          [ 'E:MPU requires that the System Interface is either None, PIF or AXI4' ] ]
# START: The book of LINUX and wide errors - Author tkapil :D :p
#
# 0-RI.6 
#         - wide ecc not allowed on Data Cache
#         - memory errors are not allowed on local memories   
#
# Bewteen RI.1-RI.6 (with special features)
#         - WITH feature 'mmu_wordecc_lx', wide ecc was allowed on Data Cache with 7 stage pipe
#         - WITH feature 'mmu_ecc_lmem', memory errors were allowed on local memories 
#
# RI.7-99999 
#         - FIRSTLY, with linuxmmu memory errors are allowed generally (only local memories) 
#         - Wide/Narrow errors (ecc/parity) are allowed with 1 dram. 
#         - Only Narrow errors (ecc/parity) are allowed with 2 drams.       
#         - With data cache wide ecc is NOT ALLOWED 
#     
#  ******** START NEW LINUXMMU MEM ERROR RULES RI.7+
      - [ [ 'mmuType!=LinuxMMU' ],
          [ 'model:lmem[memName:=dataram.1].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.1].memError==0' ],
          [ 'dataMemErrorWidth==1' ],
          [ 'E:MMU with TLBs with 2 DRam do not support wide errors(ecc/parity).' ] ]  
      - [ [ 'F:!mmu_wordecc_lx' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'dc.memErr==0' ],
          [ 'dataMemErrorType!=2' ],
          [ 'dataMemErrorWidth==1' ],
          [ 'E:MMU with TLBs does not support wide ECC on Data Cache.' ] ]             
#  ******** END NEW LINUXMMU MEM ERROR RULES  
      - [ [ 'P:rel' ],                # the old rule for pre-ri.1 lx7 regardless of feature
          [ 'bwisanver>=27100010' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'dataMemErrorType!=2' ],
          [ 'dataMemErrorWidth==1' ],
          [ 'E:With the full MMU with TLBs, wide D-side memory errors not supported (1)' ] ]
      - [ [ 'F:!mmu_wordecc_lx' ],  # the new rule without the feature for ri.1-ri.6 
          [ 'mmuType!=LinuxMMU' ],
          [ 'dataMemErrorType!=2' ],
          [ 'dataMemErrorWidth==1' ],
          [ 'P:rel' ],
          [ 'bwisanver>=27100070' ],          
          [ 'E:With the full MMU with TLBs, wide D-side memory errors not supported (2)' ] ]
      - [ [ 'F:mmu_wordecc_lx' ],  # the new rule with the feature for ri.1 and later
          [ 'P:rel' ],
          [ 'bwisanver>=27100070' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'dataMemErrorType!=2' ],
          [ 'dataMemErrorWidth==1' ],
          [ 'dataMemErrorWidth==4', 'tempPipeLength==7' ],
          [ 'E:Full MMU is only compatible with byte ECC or 7 stage + word ECC (F)' ] ]
      - [ [ 'P:rel' ],                # the old rule for pre-ri.1 lx7 regardless of feature
          [ 'bwisanver>=27100010' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'model:lmem[memName:=dataram.0].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.0].memError==0' ],
          [ 'E:With the full MMU with TLBs, memory errors cannot be configured on local memories (1)' ] ]
      - [ [ 'F:!mmu_ecc_lmem' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'P:rel' ],
          [ 'bwisanver>=27100070' ],
          [ 'model:lmem[memName:=dataram.0].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.0].memError==0' ],
          [ 'E:For this release, MMU with TLBs require that memory errors are not configured on local memories.' ] ]      
      - [ [ 'F:!lx7_altbgmap' ],
          [ 'mmuType!=IMMU' ],
          [ 'cfg_vector_style!=lx7_bdsm' ],
          [ 'E:The alternate background map vector layout together with the MPU interacts with your system memory layout - contact support to discuss considerations' ] ]
      - [ [ 'sw_mvlinux==1'],
          [ 'mmuType!=LinuxMMU' ],
          [ 'ic.size>0' ],
          [ 'W:It is STRONGLY RECOMMENDED that <Instruction Cache> be selected to complement <Memory management selection> instructions.' ] ]
      - [ [ 'P:rel' ],
          [ 'bwisanver>=27100070' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'dc.size==0' ],
          [ 'loadStoreUnits!=2' ],
          [ 'altPageSizes==1' ],
          [ 'For this release, 2 Load-Store Units with Data Cache are not compatible with Full MMU with TLBs' ] ]
      - [ [ 'P:rel' ],
          [ 'bwisanver>=27100070' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'loadStoreUnits!=2' ],
          [ 'altPageSizes==1' ],
          [ 'For this release, <Full MMU with TLBs> requires that <LoadStore units> is 1' ] ]
      - [ [ 'mmuType!=LinuxMMU' ],
          [ 'cbox==0' ], 
          [ 'P:rel' ],
          [ 'bwisanver>=27100070' ],
          [ 'The selected value of <Memory management selection> (Full MMU with TLBs) requires that <Connection box> is not selected for this release' ] ]
      - [ [ 'F:!linuxmmu_gods,debug' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'cfg_vector_style==lx7_linuxmmu_sysmem' ],
          [ 'model:smem[memName:=sysram.0].pAddr==0' ],
          [ 'E:Linux MMU requires that either vector layout is <Xtensa LX7 Full MMU SysMem Layout> or SysRAM Physical Address is 0x0' ] ]      
      - [ [ 'F:!linuxmmu_gods,debug' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'cfg_vector_style==lx7_linuxmmu_sysmem' ],
          [ 'model:smem[memName:=sysrom.0].sizeBytes==0' ],
          [ 'model:smem[memName:=sysrom.0].pAddr==4261412864' ], # 0xFE00_0000
          [ 'E:Linux MMU requires that either vector layout is <Xtensa LX7 Full MMU SysMem Layout> or SysROM Physical Address is 0xFE000000' ] ]      
      - [ [ 'F:!linuxmmu_gods,debug' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'cfg_vector_style==lx7_linuxmmu_sysmem' ],
          [ 'cfg_auto_vectors==1' ],
          [ 'E:Linux MMU requires that either vector layout is <Xtensa LX7 Full MMU SysMem Layout> or <Auto vector positioning> is 1' ] ]        
      - [ [ 'F:!linuxmmu_gods,debug' ],
          [ 'mmuType!=LinuxMMU' ],
          [ 'cfg_auto_mmap==1' ],
          [ 'E:The selected value of <Memory management selection> (Full MMU with TLBs) requires that <Auto memory location> is 1' ] ]
      - [ [ 'mmuType!=LinuxMMU' ],
          [ 'cfg_vector_style!=lx7_linuxmmu_sysmem' ],
          [ 'model:smem[memName:=sysrom.0].sizeBytes>=4096' ],
          [ 'E:<Xtensa LX7 Full MMU SysMem Layout> requires that SysROM size is at least 4K.' ] ] 
      - [ [ 'mmuType!=LinuxMMU' ],
          [ 'model:smem[memName:=sysram.0].sizeBytes==0' ],
          [ 'model:smem[memName:=sysram.0].pAddr<=134217727' ],
          [ 'E:Linux MMU requires that SysRAM Physical Address start is in the range 0x0 - 0x7FF_FFFF' ] ]    
      - [ [ 'mmuType!=LinuxMMU' ],
          [ 'model:smem[memName:=sysram.0].sizeBytes==0' ],
          [ 'model:vecReset.vAddrStart<model:smem[memName:=sysram.0].pAddr' ],
          [ 'model:vecReset.vAddrStart>=model:smem[memName:=sysram.0].pAddrEnd' ],
          [ 'E:Full MMU with TLB requires that Reset Vector is placed in IRAM/ROM or SROM.' ] ]                                                 
      pgr: 'Memory Management Options'
      bdeps2: { LinuxMMU: [debugEnabled~2, density~2, loops~2, nsa~2, pifEnabled~2, condStoreSync~2, dc.size, vectorsReloc] }
      bcons2: { IMMU: [ condStoreSync ] }
      bsdeps2: {  IMMU: { cfg_vector_style: '!lx2' }, LinuxMMU: { sw_abi: 'windowed~2', unalignedLoadAction: 'exception:hardware~2' } }
      mindeps2: { LinuxMMU: { miscSpecRegs: 0-2-4, instTraps: 0-2-2, dataTraps: 0-2-2 } }         
      jsrules: [ 'lmem~smem~udma' ] 
      dv: CaMMU
      isa:
      - { choice: [ [ '-', 'XEA1: CacheAttr' ]  ], dv: '-', hi: 399, lo: 0 }
      - { choice: [ [ '-', 'XEA1: CacheAttr' ], [ 'CaMMU', 'XEA2: Region protection' ], [ 'CaXltMMU', 'XEA2: Region protection with translation' ], [ 'LinuxMMU', 'XEA2: Full MMU with TLBs' ] ], dv: '-', hi: 499, lo: 400 }
      - { choice: [ [ '-', 'XEA1: CacheAttr' ], [ 'CaMMU', 'XEA2: Region protection' ], [ 'CaXltMMU', 'XEA2: Region protection with translation' ], [ 'LinuxMMU', 'XEA2: Full MMU with TLBs' ] ], dv: CaMMU, hi: 599, lo: 500 }
      - { choice: [ [ 'CaMMU', 'XEA2: Region protection' ], [ 'CaXltMMU', 'XEA2: Region protection with translation' ], [ 'LinuxMMU', 'XEA2: Full MMU with TLBs' ] ], dv: CaMMU, hi: 1199, lo: 600 }
      - { choice: [ [ 'CaMMU', 'XEA2: Region protection' ], [ 'CaXltMMU', 'XEA2: Region protection with translation' ], [ 'LinuxMMU', 'XEA2: Full MMU with TLBs' ], [ 'IMMU', 'XEA2: MPU (Memory Protection Unit)' ] ], dv: CaMMU, hi: 99999, lo: 1200 }
  - instEntries:
      n: Instruction TLB way 0-3 entries
      tt: |-
          Instruction entries per way for 0-3 ways
      t: int
      nat: HS  
      helppage: linuxmmu_subops
      minmax: false
      pgr: 'Full MMU with TLBs Sub-Options'
      order: 120
      p: { p: 'mmuType:LinuxMMU', d: 4 }
      dv: 4
      isa:
      - { choice: [ 4, 8 ], hi: 99999, lo: 0 }
  - dataEntries:
      n: Data TLB way 0-3 entries
      tt: |-
          Data entries per way for 0-3 ways
      t: int
      nat: HS
      minmax: false
      helppage: linuxmmu_subops
      pgr: 'Full MMU with TLBs Sub-Options'
      order: 140
      p: { p: 'mmuType:LinuxMMU', d: 4 }
      dv: 4
      isa:
      - { choice: [ 4, 8 ], hi: 99999, lo: 0 }
  - immu_noofbgmapentries:
      n: Number of Background Map Entries
      tt: |-
          Number of Background Map Entries
      t: int
      nat: HS
      dv: 8
      exist: false
  - immu_noofmpuentries:
      n: Number of MPU entries
      tt: |-
          Number of foreground MPU entries for runtime map configuration
      t: int
      order: 160
      nat: HS
      minmax: false
      p: { p: 'mmuType:IMMU', d: 32 }
      dv: 32
      isa:
      - { exist: false, hi: 1199, lo: 0 }
      - { hi: 99999, lo: 1200, rangepo2: { hi: 5, lo: 4  } }
  - immu_virtualaddrstart:
      n: Virtual Address Start LSB
      tt: |-
          Virtual Address Start LSB
      t: int
      nat: HS
      order: 180
      p: 'mmuType:IMMU'
      dv: 12
      exist: false
  - immu_noofmtuentries:
      n: Number of MTU entries
      tt: |-
          Number of MTU entries
      t: int
      nat: HS
      order: 200
      p: 'mmuType:IMMU'
      dv: 0
      exist: false
  - immu_lock:
      n: Enable MPU Locking
      tt: |-
          Enable locking of the MPU
      t: ibool
      nat: HS
      order: 220
      minmax: false
      p: { p: 'mmuType:IMMU', d: 0 }
      dv: 0
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0 }
  - immu_useMinMPUEntry:
      n: Enable MPU Small Pages
      t: ibool
      nat: HS
      minmax: false
      order: 240
      p: { p: 'mmuType:IMMU', d: 0 }
      dv: 0
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0 }
  - altPageSizes:
      n: Alternative Page Sizes
      tt: |-
          Alternative Page Sizes
      t: int
      nat: HS
      minmax: false
      helppage: linuxmmu_subops
      order: 150
      p: { p: 'mmuType:LinuxMMU', d: 0, e: 1 }
      pgr: 'Full MMU with TLBs Sub-Options'
      bsdeps2: { '!0': { tempBus: 'axi4:pif' } }
      bcons2: { '!0': [ transparentLatches, master_exclaccess, prefetchToL1 ] }
      evalex:              
      - [ [ 'strcmp("${mmuType}","LinuxMMU") && ${altPageSizes}==0 && ${loadStoreUnits}==2' ],
          [ 'N:Classic Linux page sizes with 2 Load-Store units does not support SW table-walk' ] ]        
      exprdeps:      
      - [ [ 'altPageSizes==0' ],
          [ 'model:lmem[memName:=dataram.0].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.0].memError==0' ],
          [ 'bwisanver>=27100070' ],
          [ 'P:rel' ],          
          [ 'E:For this release, the selected value of <Alt Page Sizes> (1) requires that memory errors are not configured on local memories' ] ]                                         
      dv: 0
      isa:
      - { exist: false, hi: 27100_06_9, lo: 0 }
      - { choice: [ [ 0, 'Not Configured' ], [ 1, '1' ] ], hi: 99999, lo: 27100_07_0 }      
  - extMemAttributes:
      n: Extended Memory Types
      t: ibool
      nat: HS
      minmax: false
      helppage: linuxmmu_subops
      order: 250
      p: { p: 'mmuType:LinuxMMU', d: 0 }
      pgr: 'Full MMU with TLBs Sub-Options'
      bcons: [ master_exclaccess, prefetchToL1 ]
      evalex:              
      - [ [ 'strcmp("${wizpage}","rel") && ${bwisanver}<27100070 && ${extMemAttributes}>0 && ${axi_acelite}>0' ],
          [ 'E:<${extMemAttributes}> requires that <${axi_acelite}> is not selected for this release' ] ]       
      - [ [ 'strcmp("${wizpage}","rel") && ${bwisanver}<27100070 && ${extMemAttributes}>0 && strcmp("${tempBus}","axi4")==0' ],
          [ 'E:For this release, the selected value of <${extMemAttributes}> requires that AXI4 Bus is selected' ] ]                                
      bsdeps: { tempBus: 'axi4:pif' }   
      dv: 0
      isa:
      - { exist: false, hi: 27100_05_9, lo: 0 }
      - { hi: 27199_99_9, lo: 27100_06_0 }   
      - { hi: 99999, lo: 29000_00_0, exist: false }      
  - instWays4: # way 4 sets I-Indxcnt 4 and 5 in sari
      n: Instruction TLB way 4-5 entries
      tt: |-
          Instruction entries per way for 4-5 ways
      t: int
      nat: HS
      minmax: false
      order: 260
      p: { p: 'altPageSizes:1', d: 4 }
      pgr: 'Full MMU with TLBs Sub-Options'
      dv: 4
      isa:
      - { exist: false, hi: 27100_05_9, lo: 0 }
      - { choice: [ 4, 8 ], hi: 99999, lo: 27100_06_0 }
  - dataWays4: # way 4 sets D-Indxcnt 4 and 5 in sari
      n: Data TLB way 4-5 entries
      tt: |-
          Data entries per way for 4-5 ways
      t: int
      nat: HS
      minmax: false
      order: 270
      p: { p: 'altPageSizes:1', d: 4 }
      pgr: 'Full MMU with TLBs Sub-Options'
      dv: 4
      isa:
      - { exist: false, hi: 27100_05_9, lo: 0 }
      - { choice: [ 4, 8 ], hi: 99999, lo: 27100_06_0 }     
  - dataWays7: # way 7 sets D-Indxcnt 7 - 9 in sari
      n: Data TLB way 7-9 entries
      tt: |-
          Data entries per way for 7-9 ways
      t: int
      nat: HS
      minmax: false
      order: 270
      p: { p: 'altPageSizes:1', d: 1 }
      pgr: 'Full MMU with TLBs Sub-Options'
      dv: 1
      isa:
      - { exist: false, hi: 27100_05_9, lo: 0 }
      - { choice: [ 1, 4 ], hi: 99999, lo: 27100_06_0 }               
  vector:
  - tempVecbase:
      n: Default Dynamic Vector Group VECBASE
      tt: |-
          The default dynamic vector group base address (VECBASE) is a read-only field
          which is automatically computed as the vector locations change. This is the initial
          value of the VECBASE register from which the dynamic vector offsets are based.
      t: str
      nat: HSMV
      p: vectorsReloc
      persist: false
      prodvar: true
      minmax: false
      order: 350
      dv: ''
      isa:
      - { exist: false, hi: 709, lo: 0 }
      - { dv: 'uninit', hi: 99999, lo: 710 }
  - vectorsReloc:
      n: Relocatable Vectors
      tt: |-
          If Relocatable Vectors are enabled, you can provide an alternate address
          for reset (pin selectable), and the dynamic vectors can be moved at run-time
      t: ibool
      nat: HSMV
      pgr: 'Vector Control'
      prodvar: true
      minmax: false
      order: 200
      isa:
      - { exist: false, hi: 709, lo: 0 }
      - { hi: 99999, lo: 710 }
  - vectorsStaticAltBase:
      n: Alternate Static Vector Base Address
      tt: |-
          This address is an alternate address for the static vectors
          (reset and memory errors) which will be used if the appropriate
          pin is asserted.
      t: str
      nat: HSMV
      p: vectorsReloc
      prodvar: true
      minmax: false
      order: 250
      isa:
      - { exist: false, hi: 709, lo: 0 }
      - { dv: 0x00000000, hi: 99999, lo: 710 }
  - vecBase1FromPins:
      n: External Reset Vector
      tt: |-
          Causes the processor to reset from an address driven externally
      t: ibool
      nat: HSMV
      p: vectorsReloc
      prodvar: true
      minmax: false
      order: 300
      isa:
      - { exist: false, hi: 1203, lo: 0 }
      - { hi: 99999, lo: 1204 }
  'vector/recs':
    t: vector
    pgr: 'Vectors'
    fields: [ vaddr, prefix, size ]
    prodvar: true
    minmax: false
    isa:
    - { lo: 0, hi: 99999,
        reclist: [ vecReset, vecWindow, vecKernel, vecUser, vecDouble, vecNmi, vecMemErr ],
        recset: { name: vecLevel, reclo: 2, rechi: 6 } }
  safety:
  - wwdt:
      n: Windowed Watchdog Timer
      tt: |-
          Add a watchdog timer to monitor processor execution
          for stalls or other hangs
      jsrules: [ wwdt_reset_val, wwdt_hb_reset_val ]
      mindeps: { intLevelCount: 2 }
      t: ibool
      nat: HV
      pgr: 'Windowed Watchdog Timer'    
      bdeps: [ ocd ]
      order: 100
      evalex:              
      - [ [ 'strcmp("${pso.domains}","None") && ${traxMemBytes}==0 && ${perfcounters}==0' ],
          [ 'E:<${wwdt}> requires that at least one of <${pso.domains}>, <${perfcounters}> or <${traxMemBytes}> are also configured' ] ]       
      exprdeps:
      - [ [ 'model:int[typeId:=nmi].level>1' ],
          [ 'E:Watchdog Timer requires that an NMI interrupt is configured' ] ]
      - [ [ '_wwdt_entropy>54' ],
          [ 'W:Low Windowed Watchdog Timer key entropy - improve value / bit spread' ] ]
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0 }
  - wwdt_reset_val:
      n: WWDT Reset Value
      tt: |-
          Value range: 0 - 0xF_FFFF
      t: int
      nat: HVX
      p: { p: wwdt, d: 0xF4, e: 0xF4 }
      order: 110
      dv: 0xF4
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFFFF } }
  - wwdt_hb_reset_val:
      n: WWDT Heatrtbeat Reset Value
      tt: |-
          Value range: 0 - 0xF_FFFF
      t: int
      nat: HVX
      p: wwdt
      order: 120
      dv: 0x0
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFFFF } }
  - wwdt_ikey:
      n: WWDT IKEY
      tt: |-
          Key range: 0 - 0xFFF
      t: int
      nat: HVX
      p: wwdt
      order: 200
      dv: 0x0
      evalex:
      - [ [ '${wwdt}>0 && ${wwdt_ikey}==${wwdt_bkey}' ],
          [ 'N:Watchdog timer keys should be different for best detectability (IKEY/BKEY)' ] ]
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - wwdt_bkey:
      n: WWDT BKEY
      tt: |-
          Key range: 0 - 0xFFF
      t: int
      nat: HVX
      p: wwdt
      order: 210
      dv: 0x0
      evalex:
      - [ [ '${wwdt}>0 && ${wwdt_bkey}==${wwdt_rkey}' ],
          [ 'N:Watchdog timer keys should be different for best detectability (BKEY/RKEY)' ] ]      
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - wwdt_rkey:
      n: WWDT RKEY
