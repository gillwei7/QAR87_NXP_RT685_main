      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - wwdt_c1key:
      n: WWDT C1KEY
      tt: |-
          Key range: 0 - 0xFFF
