      - { choice: [ [ 0, 'Match PIF/AXI' ], [ 32, '32' ], [ 64, '64' ], [ 128, '128' ], [ 256, '256' ] ], hi: 27199_99_9, lo: 27100_00_0 }
      - { choice: [ [ 0, 'Match PIF/AXI' ], [ 128, '128' ], [ 256, '256' ] ], hi: 99999, lo: 29000_00_0 }
  - activityPort:
