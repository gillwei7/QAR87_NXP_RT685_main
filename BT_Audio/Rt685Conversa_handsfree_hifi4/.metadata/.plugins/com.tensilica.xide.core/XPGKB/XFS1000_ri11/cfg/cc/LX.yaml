  - sg_scatter:
      n: Gather Scatter
      tt: |-
          Gather Scatter 
      bsdeps: { unalignedLoadAction: exception,  mmuType: 'IMMU:LinuxMMU' }    
      bdeps: [ '+early.restart' ]
      mindeps: { pifWidthBits: 128, loadStoreUnits: 2, tempPipeLength: 7 } 
      oneof: [ [ *all_sg_dsps ] ]
      pgr: 'Scatter/Gather Options' 
      order: 400     
      exprdeps:
      - [ [ 'dataMemErrorType==2', 'dataMemErrorWidth==4' ],
          [ 'dataMemErrorType==0' ],
          [ 'dataMemErrorType==1' ],
          [ 'E:<Gather Scatter> configured with ECC requires error width 4 (word ECC).' ] ]
      - [ [ 'dataMemErrorType==1', 'dataMemErrorWidth==1' ],
          [ 'dataMemErrorType==0' ],
          [ 'dataMemErrorType==2' ],
          [ 'E:<Gather Scatter> configured with Parity requires error width 1 (byte Parity).' ] ]      
      - [ [ 'model:lmem[memName:=dataram.1].sizeBytes>0', 'model:lmem[memName:=dataram.0].numBanks==2' ],
          [ 'model:lmem[memName:=dataram.1].sizeBytes==0', 'model:lmem[memName:=dataram.0].numBanks==4' ],
          [ 'E:<Gather Scatter> with 2 DataRAMs requires 2 DataRAM banks, or with one DataRAM requires 4 DataRAM banks' ] ]
      - [ [ 'model:lmem[memName:=dataram.0].sizeBytes>=16384' ],
          [ 'E:<Gather Scatter> require that DataRAMs are at least 16KB' ] ]
      - [ [ 'F:!sg_onedram' ],
          [ 'model:lmem[memName:=dataram.1].sizeBytes>=16384' ],
          [ 'E:<Gather Scatter> require that both DataRAMs are at least 16KB' ] ]
      - [ [ 'F:sg_onedram' ],
          [ 'model:lmem[memName:=dataram.1].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.1].sizeBytes>=16384' ],
          [ 'E:<Gather Scatter> require that the second DataRAM, if configured, is at least 16KB' ] ]
      - [ [ 'sg_scatter==0' ],      
          [ 'mmuType!=LinuxMMU' ], 
          [ 'model:lmem[memName:=dataram.0].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.1].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.0].sizeBytes==model:lmem[memName:=dataram.1].sizeBytes' ],     
          [ 'E: <Full MMU with TLBs> with <Gather Scatter> and 2 Data RAMs require that both the RAMs have the same size.' ] ]                    
      t: ibool
      nat: HS
      p: { p: '_enable_scattergather', d: 0 }
      isa:
      - { exist: false, hi: 1200, lo: 0 }
      - { visible: false, hi: 27100_05_9, lo: 1201 }
      - { visible: true, hi: 99999, lo: 27100_06_0 }        
