      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - flexlock_c1key:
      n: FlexLock C1KEY
      tt: |-
          Key range: 0 - 0xFFF      
      t: int
      nat: HVX
      p: flexlock
      order: 250
      dv: 0x0
      evalex:
      - [ [ '${flexlock}>0 && ${flexlock_c1key}==${flexlock_c2key}' ],
          [ 'E:FlexLock keys should be different for best detectability (C1KEY/C2KEY)' ] ]      
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - flexlock_c2key:
