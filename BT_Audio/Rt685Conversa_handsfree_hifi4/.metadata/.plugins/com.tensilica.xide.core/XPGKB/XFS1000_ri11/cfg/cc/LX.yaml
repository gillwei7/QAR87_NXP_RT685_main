      pgr: 'PSO - Power Shut-Off'
      order: 200
      minmax: true
      prodvar: false
      dv: None
      isa:
      - { exist: false, hi: 999, lo: 0 }
      - { choice: [ [ 'None', 'None' ], [ 'Partial', 'Partial' ], [ 'Full', 'Full' ] ], hi: 27199_99_9, lo: 1000 }
      - { visible: false, hi: 99999, lo: 29000_00_0 }
  - sem.data.gating:
      n: Semantic Data Gating
      tt: |-
          Set the input operands of functional units to a nonchanging value when the unit is not being used in order to save switching power. User-defined honors use of the corresponding property in user TIE source.
      t: str
      nat: HV
      pgr: 'More Power Saving and Gating'
      order: 200
      minmax: true
      prodvar: false
      dv: None
      isa:
      - { exist: false, hi: 999, lo: 0 }
      - { choice: [ [ 'None', 'None' ], [ 'User', 'User' ], [ 'All', 'All' ] ], hi: 99999, lo: 1000 }
  - mem.data.gating:
      n: Memory Data Gating
      tt: |-
          Gates the Addr and WrData inputs to the memories. Memory data gating applies to all configured memories equally
      t: ibool
      nat: HV
      pgr: 'More Power Saving and Gating'
      order: 250
