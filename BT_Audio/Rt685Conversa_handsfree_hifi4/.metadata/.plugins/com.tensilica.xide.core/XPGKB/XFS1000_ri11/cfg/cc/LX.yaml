                                      'smem.2': 'sysram.2',
                                      'smem.3': 'sysram.3',
                                      'smem.4': { name: 'sysrom.0', paddr: 0x50000000, size: 0x20000, secsize: 0x0 } ,
                                      'smem.5': 'sysrom.1',
                                      'smem.6': 'sysrom.2',
