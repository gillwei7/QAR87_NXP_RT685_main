      pgr: 'More Power Saving and Gating'
      order: 100
      minmax: true
      prodvar: false
      isa:
      - { exist: false, hi: 999, lo: 0 }
      - { hi: 27199_99_9, lo: 1000, rangepo2: { hi: 13, inczero: true, lo: 4  } }
      - { hi: 99999, lo: 29000_00_0, rangepo2: { hi: 10, inczero: true, lo: 4  } }
