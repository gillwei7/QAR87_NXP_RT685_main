      - [ [ '${wwdt}>0 && ${wwdt_c1key}==${wwdt_c2key}' ],
          [ 'W:Watchdog timer keys should be different for best detectability(1) (C1KEY/C2KEY)' ] ]   
      - [ [ '${wwdt}>0 && ${wwdt_c1key}==${wwdt_c2key} && strcmp("${wizpage}","rel") && ${bwisanver}>=27100070' ],
          [ 'E:Watchdog timer keys should be different for best detectability (C1KEY/C2KEY)' ] ]                                
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - wwdt_c2key:
