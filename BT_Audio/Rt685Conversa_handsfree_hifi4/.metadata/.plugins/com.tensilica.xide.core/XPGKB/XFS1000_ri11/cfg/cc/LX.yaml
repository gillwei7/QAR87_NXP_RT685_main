  dataCache:
  - dc.size:
      n: Data Cache size
      tt: |-
          Data Cache size in bytes
      t: int
      nat: HSV
      evalex:
      - [ [ 'strcmp("${mmuType}","IMMU") && ${dc.writeBack}!=1' ],
          [ 'E:Data Cache when configured with the MPU must be configured as write-back' ] ]     
      - [ [ '${dc.size}>65536' ],
          [ 'W:Data Cache beyond 64k is supported, but may cause significant speed (MHz) degradation' ] ]           
      exprdeps:
      - [ [ 'dc.lineSize>=$_lx_min_dclinesized2' ],
          [ 'E:Data cache line is not large enough to accomodate DataWidth*NumBanks' ] ]
      - [ [ 'dc.lineSize>=$_lx_min_dclinesize' ],
          [ 'bwisanver>=27100040', 'mmuType==IMMU' ],
          [ 'bwisanver>=27100060', 'mmuType==LinuxMMU', 'altPageSizes==1' ],
          [ 'bwisanver>=27100070', 'mmuType==LinuxMMU' ],
          [ 'P:rel' ],
          [ 'E:Data cache line is not large enough DataWidth*NumBanks for this release and MMU selection' ] ]
      pgr: 'Data Cache'
      p: { p: 'tempBus:pif:ahblite:axi:axi4', d: 0, e: 1024 }
      order: 100
      prodvar: true
      dv: 1024
      isa:
      - { hi: 699, lo: 0, rangepo2: { hi: 15, inczero: true, lo: 10  } }
      - { hi: 99999, lo: 700, choice: [ 0, 1024, 1536, 2048, 3072, 4096, 6144, 8192, 12288, 16384, 24576, 32768, 49152, 65536, 98304, 131072 ] }
