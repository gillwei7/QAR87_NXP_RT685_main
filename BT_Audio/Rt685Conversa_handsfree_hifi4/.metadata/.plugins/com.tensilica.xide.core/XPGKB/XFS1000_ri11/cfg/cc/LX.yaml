#
# templates for brevity - mostly in the bcons lists (conflicts with many)
#
# NOTE WELL that these are aliased as LIST nodes ... not as a sequence of entries
# so the list processor has to deal with a list-in-a-list
#
_templates:
- &bbeplist
  [ cx_bbep8, cx_bbep16, cx_bbep32, cx_bbep64 ]
- &bbenlist
  [ cx_bben_ue32, cx_bben_ue32l, cx_bben_gpc32 ]
- &hifilist
  [ hifi2, hifi2_40, hifi3, hifi3_2slot, hifi3z, hifi4, hifi5, fsn ]
- &pdxlist
  [ pdx, pdx4b, pdx8, pdx4b_fpm128 ]
- &atlaslist
  [ cx_bbe16, cx_bsp3, cx_ssp16, cx_turbo16 ]
- &ivplist
  [ cx_bben_ivp32, ivpep_sac, ivp2_32, ivp26_32, ivp2c_32, ivp2ce_32, visionp1, visionp_128, visionp_512 ]
- &allcoprocslist
  [ vectra2, connx, flixedcore570,
    cx_bbep8, cx_bbep16, cx_bbep32, cx_bbep64, fpmlx_128, fpmlx_512,
    cx_bben_ue32, cx_bben_ue32l, cx_bben_gpc32, 
    hifi2, hifi2_40, hifi3, hifi3_2slot, hifi3z, hifi4, hifi5, hifi_le, fsn, 
    pdx, pdx4b, pdx8, pdx4b_fpm128,
    cx_bbe16, cx_bsp3, cx_ssp16, cx_turbo16, 
    cx_bben_ivp32, ivpep_sac, ivp2_32, ivp26_32, ivp2c_32, ivp2ce_32, visionp1, visionp_128, visionp_512,
    bbnlx_128, bbnlx_256 ]
- &allcoprocslistnod2hifi2
  [ vectra2,
    cx_bbep8, cx_bbep16, cx_bbep32, cx_bbep64, fpmlx_128, fpmlx_512,
    cx_bben_ue32, cx_bben_ue32l, cx_bben_gpc32, 
    hifi3, hifi3_2slot, hifi3z, hifi4, hifi5, fsn, 
    pdx, pdx4b, pdx8, pdx4b_fpm128,
    cx_bbe16, cx_bsp3, cx_ssp16, cx_turbo16, 
    cx_bben_ivp32, ivpep_sac, ivp2_32, ivp26_32, ivp2c_32, ivp2ce_32, visionp1, visionp_128, visionp_512,
    bbnlx_128, bbnlx_256 ]
- &stddspdeps
  [ +brs, +clamps, density, loops, minMax, mul16, nsa, sext, +tieArbitraryByteEnable ]
- &stddspdeps_sans_brs
  [ +clamps, density, loops, minMax, mul16, nsa, sext, +tieArbitraryByteEnable ]
- &all_FP_options
  [ fp, hifi3_vector_fp, hifi3z_vector_fp, hifi4_vector_fp, fsn_fp, pdx, pdx4b_sfp, pdx4b_fpm128, 
    pdx8_sfp, ivp2_spvfp, ivp26_spvfp, ivp26_dpvfp, cxep.spvfp, hifi5_spvfp, 
    hifi_le_fp, vp1_sp_vfp, fpmlx_spvfp, bbnlx_sp_vfp, vp_128_spvfp, vp_512_spvfp ]  
- &all_ai_engines
  [ xnne_num_sblks, nna_engine, nne_engine ] 
- &all_sg_dsps
  [ visionp1, ivp2_32, ivp26_32, fpmlx_128, fpmlx_512, bbnlx_128, bbnlx_256, visionp_128, visionp_512 ]   

