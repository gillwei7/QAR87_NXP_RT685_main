      bdeps2: { '!0': [ +udma, +ivp26_quadmac, implasyncreset, dynamic_way_disable, debugAPB, +pifWriteResp ] }    
      mindeps: { +ic.size: 65536, intCount: 7 }
      bsdeps: { l32r: l32r_const16, pso.domains: None, udma_data_width: '0:128:256', axi_ecc: 'none' }
      bcons: [ pifAsync, *all_ai_engines ]
      mindeps2: { '2': { xnne_num_m_per_s: 4-4 }, '4': { xnne_num_m_per_s: 4-4 } }              
      exprdeps:
       - [ [ 'model:int[extIntRevIndex:=0].typeId==level' , 'model:int[extIntRevIndex:=1].typeId==level', 'intCount>=0' ],
           [ 'E:DNA100 requires that the two highest numbered external interrupts are Level interrupts' ] ]      
       - [ [ 'ext_intcount>2', 'model:int[index:=0].index==0', 'intCount>=0' ],
           [ 'E:DNA100 requires that at least 3 external interrupts are configured' ] ]  
       - [ [ 'model:lmem[memName:=dataram.0].sizeBytes>=131072' ],
           [ 'E:DNA100 requires that DataRAMs are at least 128KB' ] ]
       - [ [ 'model:lmem[memName:=dataram.1].sizeBytes>=131072' ],
           [ 'E:DNA100 requires that both DataRAMs are at least 128KB' ] ]                         
       - [ [ 'model:lmem[memName:=dataram.0].dma==1' ],
           [ 'E:DNA100 requires that DataRAMs are configured with Inbound access' ] ]
      t: int
      nat: HS
      pgr: 'DNA100'
      p: ivp26_32
      order: 100
      nofeaturevis: false
      isa:
      - { hi: 27100_00_9, lo: 0, exist: false }
      - { hi: 27199_99_9, lo: 27100_01_0, choice: [ [ 0, 'Not Configured' ], [ 1, '1' ], [ 2, '2' ] ], feat: xnne }
      # conti in LX-ext.yaml...    
  - xnne_num_m_per_s:
      n: DNA100 Count of MBLKs per SBLK
      t: int
      nat: HS
      p: { p: xnne_num_sblks, d: 1 }
      order: 120
      dv: 1
      isa:
      - { hi: 27100_00_9, lo: 0, exist: false }
      - { hi: 99999, lo: 27100_01_0, choice: [ 1, 2, 4 ], feat: xnne }
