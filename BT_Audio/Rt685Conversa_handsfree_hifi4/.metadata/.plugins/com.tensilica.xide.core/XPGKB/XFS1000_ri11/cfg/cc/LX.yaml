      dv: 16
      isa:
      - { hi: 899, lo: 0, rangepo2: { hi: 6, lo: 4  } }
      - { feat: linesize256, hi: 899, lo: 800, rangepo2: { hi: 8, lo: 4  } }
      - { hi: 99999, lo: 900, rangepo2: { hi: 8, lo: 4  } }
  - ic.ways:
      n: Instruction Cache ways
      tt: |-
          Number of Instruction Cache ways
      t: int
      nat: HSV
      p: { p: 'ic.size', d: 1 }
      order: 110
      prodvar: true
      isa:
      - { dv: 1, hi: 99999, lo: 0, range: { hi: 4, lo: 1  } }
  - ic.locking:
      n: Instruction Cache line locking
      tt: |-
          Enable Instruction Cache line locking
      mindeps: { 'ic.ways': 2 }
      t: ibool
      nat: HSV
      p: 'ic.size'
      order: 120
      prodvar: true
      isa:
      - { hi: 99999, lo: 0 }
  - ic.memErr:
      n: Instruction Cache memory error
      tt: |-
          Enable Instruction Cache memory error
      t: ibool
      nat: HSV
      p: 'ic.size'
      order: 140
      prodvar: true
      isa:
      - { exist: false, hi: 699, lo: 0 }
      - { hi: 99999, lo: 700 }
  - ic.widthBits:
      n: Width of Instruction Cache interface
      tt: |-
          Width of Interface to instruction cache.
          Must be at least the width of Instruction fetch Width 
          and cannot exceed max(processor interface, InstFetch)
      t: int
      nat: HSV
      pgr: 'Processor/Memory Interface Widths'
      p: { p: ic.size, d: 0, e: 32 }
      order: 200
      prodvar: true
      dv: 32
      isa:
      - { visible: false, hi: 699, lo: 0 }
      - { choice: [ 0, 32, 64, 128 ], hi: 99999, lo: 700 }
      - { choice: [ 0, 32, 64, 128, 256 ], hi: 99999, lo: 1200, feat: instwidth_32byte }
  memerror:
  - instMemErrorType:
      n: Instruction Memory Error type
      tt: |-
          This selects memory error type (Parity/ECC), then separately
          you choose whether it applies to instruction memories and/or cache
      t: int # TENX-65513 changed to int 
      nat: HSV
      pgr: 'Memory Error Type'
      order: 100
      prodvar: true
      isa:
      - { exist: false, hi: 699, lo: 0 }
      - { choice: [ [ 0, 'none' ], [1, 'parity' ], [ 2, 'ecc' ],  ], dv: 0, hi: 99999, lo: 700 }
  - dataMemErrorType:
      n: Data Memory Error type
      tt: |-
          This selects memory error type (Parity/ECC), then separately
          you choose whether it applies to data memories and/or cache
      t: int # TENX-65513 changed to int , see exprdeps below
      nat: HSV
      evalex:
      - [ [ '${udma}==1 && strcmp("${tempBus}","axi4")==0' ],
          [ 'E:<${udma}> with data-side memory errors requires AXI4 bus interface' ] ]      
      exprdeps:
      - [ [ 'F:!mpu_pif_lx' ],
          [ 'dataMemErrorType!=2' ],
          [ 'condStoreSync==1' ],
          [ 'master_exclaccess==1' ],
          [ 'dataMemErrorWidth==4' ],
          [ 'W:Data-side ECC recommends that either Conditional Store Sync or Load/Store Exclusive is configured' ] ]
      - [ [ 'F:!mpu_pif_lx' ],
          [ 'dataMemErrorType!=2' ],
          [ 'condStoreSync==1' ],
          [ 'master_exclaccess==1' ],
          [ 'dataMemErrorWidth==1' ],
          [ 'E:Data-side ECC with wide errors requires that either Conditional Store Sync or Load/Store Exclusive is configured' ] ]
      - [ [ 'F:mpu_pif_lx' ],
          [ 'mmuType==IMMU', 'tempBus==none' ],
          [ 'dataMemErrorType!=2' ],
          [ 'condStoreSync==1' ],
          [ 'master_exclaccess==1' ],
          [ 'dataMemErrorWidth==1' ],
          [ 'E:Data-side ECC with wide errors requires that either Conditional Store Sync or Load/Store Exclusive is configured' ] ]
      - [ [ 'dataMemErrorType!=0', 'loadStoreUnits==2', 'dc.memErr==1', 'model:lmem[memName:=dataram.0].memError==1' ],
          [ 'dataMemErrorType==0' ],
          [ 'loadStoreUnits==1' ],
          [ 'dc.size==0' ],
          [ 'model:lmem[memName:=dataram.0].sizeBytes==0' ],
          [ 'E:ECC or Parity with 2 Load Store units and both Data Cache and Data Ram requires symmetry of memory error selections' ] ]
      - [ [ 'dataMemErrorType==0' ],
          [ 'dataMemErrorWidth!=4' ],
          [ 'model:lmem[memName:=dataram.0].memError==0' ],
          [ 'model:lmem[memName:=dataram.0].dma==0' ],
          [ 'W:iDMA or Inbound write to DataRAM with word-wide error protection might deadlock in rare cases. See Xtensa LX7 Microprocessor Data Book, or Cadence Support article 20492336' ] ]
#      - [ [ 'dataMemErrorType==0' ],
#          [ 'dataMemErrorWidth!=4' ],
#          [ 'model:lmem[memName:=dataram.0].memError==0' ],
#          [ 'udma==0' ],
#          [ 'W:iDMA along with Data RAM configured with word error protection may lead to deadlocks in some system situations. For system design considerations, refer to Xtensa LX7 Microprocessor Databook' ] ]
      pgr: 'Memory Error Type'
      order: 200
      prodvar: true
      isa:
      - { exist: false, hi: 699, lo: 0 }
      - { choice: [ [ 0, 'none' ], [ 1, 'parity' ], [ 2, 'ecc' ],  ], dv: 0, hi: 99999, lo: 700 }
  - dramRetry:
      n: Data RAM Retry
      tt: |-
          Data RAM Retry
      t: ibool
      nat: HSV
      pgr: 'Memory Error Type'
      order: 400
      prodvar: true
      isa:
      - { exist: false, hi: 899, lo: 0 }
      - { feat: dram_retry, hi: 27199_99_9, lo: 900, nofeaturevis: false }
      - { hi: 99999, lo: 29000_00_0, exist: false }
  - dataMemErrorWidth:
      n: Data Memory Error Width
      tt: |-
          Data Memory Error Width
      t: int
      nat: HSV
      p: { p: 'dataMemErrorType:1:2', d: 1 }
      order: 220
      prodvar: true
      dv: 1
      isa:
      - { exist: false, hi: 1099, lo: 0, choice: [ 0, 1, 4 ] }
      - { hi: 99999, lo: 1100, choice: [ 1, 4 ] }
  - prefetch_memerror:
      n: Prefetch Memory Error type
      tt: |-
          Prefetch Memory Error type
      t: int # TENX-65513 changed to int
      nat: HS
      pgr: 'Memory Error Type'
      p: prefetchEntries
      dv: 0
      order: 150
      prodvar: true
      isa:
      - { exist: false, hi: 1199, lo: 0 }
      - { choice: [ [ 0, 'none' ], [ 1, 'parity' ], [ 2, 'ecc' ],  ], dv: 0, hi: 27199_99_9, lo: 1200 }
      - { choice: [ [ 0, 'none' ], [ 2, 'ecc' ],  ], dv: 0, hi: 99999, lo: 29000_00_0 }
  - address_err:
      n: Address ECC
      t: ibool
      nat: HS
      htmlVisibility: show
      bsdeps: { instMemErrorType: 2, dataMemErrorType: 2, dataMemErrorWidth: 4 }
      p: { p: 'dataMemErrorType:2', d: 0 }
      order: 240
      evalex:
      - [ [ '${ic.size}>0 && ${ic.memErr}==0' ],
          [ 'E:If Instruction Cache is configured with Address ECC then Memory Errors must be selected for the cache' ] ]
      - [ [ '${dc.size}>0 && ${dc.memErr}==0' ],
          [ 'E:If Data Cache is configured with Address ECC then Memory Errors must be selected for the cache' ] ]
      - [ [ '${prefetchEntries}>0 && ${prefetch_memerror}!=2' ],
          [ 'E:If Prefetch is configured with Address ECC then ECC Memory Errors must be selected for prefetch' ] ]      
      exprdeps:
      - [ [ 'model:lmem[memName:=dataram.0].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.0].memError==1' ],
          [ 'E:If Data RAM is configured with Address ECC then Memory Errors must be selected for the RAM' ] ]
      - [ [ 'model:lmem[memName:=instram.0].sizeBytes==0' ],
          [ 'model:lmem[memName:=instram.0].memError==1' ],
          [ 'E:If Instruction RAM is configured with Address ECC then Memory Errors must be selected for the RAM' ] ]
      - [ [ 'model:lmem[memName:=instrom.0].sizeBytes==0' ],
          [ 'bwisanver>=27100080' ],
          [ 'P:rel' ],        
          [ 'E:Instruction ROM cannot be configured with Address ECC for this release' ] ]
      - [ [ 'model:lmem[memName:=datarom.0].sizeBytes==0' ],
          [ 'E:Data ROM cannot be configured with Address ECC' ] ]
      - [ [ 'model:lmem[memName:=dataport.0].sizeBytes==0' ],
          [ 'E:Data Port cannot be configured with Address ECC' ] ]          
      isa:
      - { hi: 27100_04_9, lo: 0, exist: false } 
      - { hi: 99999, lo: 27100_05_0 }        
