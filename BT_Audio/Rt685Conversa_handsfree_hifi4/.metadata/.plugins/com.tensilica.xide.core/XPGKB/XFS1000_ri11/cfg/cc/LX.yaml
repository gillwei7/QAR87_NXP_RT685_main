  datainterface:
  - dataWidthBits:
      n: Width of Data Memory/Cache interface
      tt: |-
          Width of interface to Data RAM, ROM, XLMI, Data Cache
      t: int
      nat: HSV
      pgr: 'Processor/Memory Interface Widths'
      order: 100
      prodvar: true
      dv: 32
      isa:
      - { hi: 99999, lo: 0, rangepo2: { hi: 7, lo: 5  } }
      - { hi: 99999, lo: 900, rangepo2: { hi: 9, lo: 5  }, feat: 'datawidth_wide,datawidth_256'  }
      - { hi: 99999, lo: 1000, rangepo2: { hi: 10, lo: 5  }, feat: datawidth_dblwide }
  - loadStoreUnits:
      n: LoadStore units
      tt: |-
          Count of Load/Store units
      t: int
      exprdeps:
      - [ [ 'model:lmem[memName:=dataram.0].splitRW==0' ],
          [ 'E:Data RAM split read/write is not supported' ] ]
      nat: HS
      pgr: 'Load/Store Interface'
      order: 100
      dv: 1
      isa:
      - { hi: 599, lo: 0, exist: false }
      - { hi: 99999, lo: 600, range: { hi: 2, lo: 1  } }
      - { hi: 1099, lo: 1000, range: { hi: 3, lo: 1  }, feat: '3ls' }
  - sg_subbanks:
      n: Gather Scatter Num Sub-Banks
      tt: |-
          Gather Scatter Num Sub-Banks
      t: int
      nat: HS
      pgr: 'Scatter/Gather Options'
      p: { p: 'sg_scatter', d: 4, e: 8 }
      evalex:
      - [ [ '${sg_scatter}>0 && ${sg_subbanks}==2 && (${ivp2_32}==1 || ${ivp26_32}==1)' ],
          [ 'E:Vision P5/P6 processors support only 4 or 8 <${sg_subbanks}>' ] ]  
      - [ [ '${sg_scatter}>0 && ${sg_subbanks}==2 && ${visionp1}==1 && ${dataWidthBits}>=512' ],           
          [ 'E:<${visionp1}> with data width >= 512 supports only 4 or 8 <${sg_subbanks}>' ] ]   
      - [ [ '${sg_scatter}>0 && ${sg_subbanks}==8 && ${visionp1}==1 && ${dataWidthBits}<=128' ],             
          [ 'E:<${visionp1}> with 128 bit data width supports only 2 or 4 <${sg_subbanks}>' ] ]     
      - [ [ '${sg_scatter}>0 && ${sg_subbanks}!=4 && ${fpmlx_128}==1' ],                
          [ 'E:<${fpmlx_128}> requires that <${sg_subbanks}> is 4' ] ]   
      - [ [ '${sg_scatter}>0 && ${sg_subbanks}!=4 && ${fpmlx_512}==1' ],     
          [ 'E:<${fpmlx_512}> requires that <${sg_subbanks}> is 4' ] ]        
      - [ [ '${sg_scatter}>0 && ${sg_subbanks}==8 && ${bbnlx_128}==1 && ${dataWidthBits}<=128' ],             
          [ 'E:<${bbnlx_128}> with 128 bit data width supports only 2 or 4 <${sg_subbanks}>' ] ]   
      - [ [ '${sg_scatter}>0 && ${sg_subbanks}==2 && ${visionp_128}==1 && ${dataWidthBits}>=512' ],           
          [ 'E:<${visionp_128}> with data width >= 512 supports only 4 or 8 <${sg_subbanks}>' ] ]   
      - [ [ '${sg_scatter}>0 && ${sg_subbanks}==8 && ${visionp_128}==1 && ${dataWidthBits}<=128' ],             
          [ 'E:<${visionp_128}> with 128 bit data width supports only 2 or 4 <${sg_subbanks}>' ] ] 
      - [ [ '${sg_scatter}>0 && ${sg_subbanks}==2 && ${visionp_512}==1' ],
          [ 'E:<${visionp_512}> support only 4 or 8 <${sg_subbanks}>' ] ]                                                                            
      order: 410
      dv: 4
      isa:
      - { exist: false, hi: 1199, lo: 0 }
      - { hi: 99999, lo: 1200, choice: [ 4, 8 ] }
      - { hi: 27199_99_9, lo: 27100_06_0, choice: [ 2, 4, 8 ], feat: 'lx_visionp1' }  
      - { hi: 99999, lo: 29000_00_0, choice: [ 2, 4, 8 ], feat: 'lx_visionp_128' }               
