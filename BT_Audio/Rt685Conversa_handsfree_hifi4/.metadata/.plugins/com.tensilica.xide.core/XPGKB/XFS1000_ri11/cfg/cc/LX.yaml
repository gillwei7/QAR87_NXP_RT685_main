      - { choice: [ [ 'none', 'None' ], [ 'pif', 'PIF' ], [ 'ahblite', 'AHB-Lite' ], [ 'axi', 'AXI3' ], [ 'axi4', 'AXI4' ],  ], dv: pif, hi: 27199_99_9, lo: 1000, bdeps2: { axi4: [ pifWriteResp~2, pif.arb.byte.enable ], axi: [ pifWriteResp~2, pif.arb.byte.enable ] } }
