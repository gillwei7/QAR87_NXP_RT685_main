      t: ibool
      nat: HV
      pgr: 'Implementation'
      order: 300
      minmax: false
      prodvar: true
      isa:
      - { exist: false, hi: 799, lo: 0 }
      - { hi: 99999, lo: 800 }
  - pso.domains:
      n: Power Shut-Off Domains
      tt: |-
          Choose the granularity of power shut-off domains
      t: str
      nat: HV
      pgr: 'PSO - Power Shut-Off'
      order: 100
      minmax: true
      prodvar: false
      dv: None
      bdeps2: { Single: [ ocd ], Core_Debug_Mem: [ ocd ] }                
      isa:
      - { exist: false, hi: 999, lo: 0 }
      - { choice: [ [ 'None', 'None' ], [ 'Single', 'Single' ], [ 'Core_Debug_Mem', 'Core_Debug_Mem' ] ], hi: 27199_99_9, lo: 1000 }
      - { choice: [ [ 'None', 'None' ] ], hi: 99999, lo: 29000_00_0, visible: false }
  - pso.core.ret:
      n: Power Shut-Off Core Retention
      tt: |-
          Choose the granularity of power shut-off core retention
