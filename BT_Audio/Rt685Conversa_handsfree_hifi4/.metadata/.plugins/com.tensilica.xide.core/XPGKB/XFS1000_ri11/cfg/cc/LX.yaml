      evalex: 
      - [ [ 'strcmp("${mmuType}","LinuxMMU") && ${extMemAttributes}==0' ],
          [ 'E: <${axi_acelite}> with <Full MMU and TLB> requires that <${extMemAttributes}> is enabled.' ] ]          
      t: ibool
      nat: HS
      pgr: 'AXI Interface/Bridge Options'
      p: 'tempBus:axi4' 
      order: 320
      prodvar: true
      isa:
      - { exist: false, hi: 1199, lo: 0 }
      - { hi: 27100_05_9, lo: 1200, bsdeps: { mmuType: IMMU } }
      - { hi: 27199_99_9, lo: 27100_06_0, bsdeps: { mmuType: 'IMMU:LinuxMMU' } }
      - { hi: 99999, lo: 29000_00_0, exist: false }          
  - udma_transpose:
      n: iDMA Transpose
      tt: |-
          iDMA Transpose
      t: ibool
      exist: false
  - udma_bufferwidth:
      n: iDMA Buffer Depth
      tt: |-
          iDMA Buffer Depth
      t: int
      nat: HS
      p: { p: udma, d: 4 }
      order: 120
      dv: 4
      isa:
      - { exist: false, hi: 1199, lo: 0 }
      - { choice: [ 1, 2, 4, 8, 16  ], hi: 27199_99_9, lo: 1200 }
      - { hi: 99999, lo: 29000_00_0, exist: false }      
  - udma_outstanding_rows:
      n: iDMA Row Count
      tt: |-
          iDMA Row Count
      t: int
      nat: HS
      p: { p: udma, d: 4 }
      order: 140
      dv: 4
      isa:
      - { exist: false, hi: 1199, lo: 0 }
      - { choice: [ 2, 4, 8, 16 ], hi: 1204, lo: 1200 }
      - { choice: [ 2, 4, 8, 16, 32, 64 ], hi: 27199_99_9, lo: 1205 }
      - { hi: 99999, lo: 29000_00_0, exist: false }         
  - udma:
      n: iDMA
      tt: |-
          iDMA
      t: ibool
      bsdeps: { tempBus: axi4, byteOrder: le }
      evalex:             
      - [ [ 'strcmp("${wizpage}","rel") && ${bwisanver}<27100070 && strcmp("${mmuType}","LinuxMMU")' ],
          [ 'E:<${udma}> with <Full MMU with TLBs> is not supported for this release' ] ]  
      - [ [ 'strcmp("${mmuType}","LinuxMMU")==0 && strcmp("${mmuType}","IMMU")==0' ],
          [ 'E:Selection of <${udma}> requires that <Memory management selection> is either Memory Protection Unit (MPU) or Full MMU with TLBs' ] ]                  
      exprdeps:
      - [ [ 'model:lmem[memName:=dataram.0].sizeBytes>0' ],
          [ 'E:iDMA requires at least one DataRAM' ] ]
      - [ [ 'loadStoreUnits==2' ],
          [ 'model:lmem[memName:=dataram.0].busy==1' ],
          [ 'bwisanver>=27100090' ],
          [ 'P:rel' ],          
          [ 'E:iDMA with a single load-store unit requires that "busy" is enabled on DataRAMs for this release.' ] ]                                                                        
      - [ [ 'udma==0' ],      
          [ 'mmuType!=LinuxMMU' ], 
          [ 'model:lmem[memName:=dataram.0].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.1].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.0].sizeBytes==model:lmem[memName:=dataram.1].sizeBytes' ],     
          [ 'E: <Full MMU with TLBs> with <iDMA> and 2 Data RAMs require that both the RAMs have the same size.' ] ]                                                                                                                                       
      nat: HS
      pgr: 'iDMA Options'
      order: 100
      isa:
      - { exist: false, hi: 1199, lo: 0 }
      - { feat: udma, hi: 1203, lo: 1200 }
      - { feat: udma_rg4, hi: 99999, lo: 1204 }
      - { feat: 'udma_rg4+lx_pif_idma', hi: 27000_99_9, lo: 27000_12_0, bsdeps: { tempBus: 'pif:axi4', byteOrder: le } }
  - udma_reorder_buffer:
      n: iDMA Re-order Buffer Max Reqs
      tt: |-
          iDMA Re-order buffer max outstanding requests
      t: int
      mindeps: { pifWidthBits: 128 }
      bsdeps2: { '!0': { tempBus: axi4, axi_ecc: none } }
      bcons2: { '!0': [ pifAsync ] }
      evalex:              
      - [ [ 'strcmp("${wizpage}","rel") && ${bwisanver}<27100030 && ${ivp2_32}==0 && ${ivp26_32}==0 && ${ivp2c_32}==0 && ${ivp2ce_32}==0' ],
          [ 'E:<${udma_reorder_buffer}> can only be configured together with Vision P or Vision C processors' ] ]  
      - [ [ '(${implCgGlobal}!=${implCgFunctionalUnit}) || (${implCgFunctionalUnit}!=${scan})' ],
          [ 'E:<${udma_reorder_buffer}> requires symmetry of <${scan}>, <${implCgFunctionalUnit}> and <${implCgGlobal}> options (all off or all on)' ] ]    
      - [ [ 'strcmp("${wizpage}","rel") && ${bwisanver}<27100030' ],
          [ 'N:Use of <${udma_reorder_buffer}> requires AXI bus run at the same clock ratio as Xtensa core. Strobe to idma Bridge must be tied to 1' ] ]                                
      exprdeps:
      - [ [ 'bwrelnver>12000070' ],
          [ 'udma_outstanding_rows<=32' ],
          [ 'P:rel' ],
          [ 'E:iDMA row count cannot exceed 32 when configured with the Reorder buffer' ] ]
      - [ [ 'bwrelnver>12000070' ],
          [ 'udma_reorder_buffer<=1' ],
          [ 'P:rel' ],
          [ 'E:This Xplorer cannot submit iDMA with Reorder buffer to this release' ] ]
      - [ [ 'udma_data_width>=128' ],
          [ 'udma_data_width==0', 'pifWidthBits>=128' ],
          [ 'E:iDMA Reorder buffer requires that the iDMA AXI width is at least 128 bits' ] ]
      nat: HS
      p: udma
      nofeaturevis: false
      order: 300
      # note the 1==32 and 32==32 entries. a cheezy way of handling the new value being legal for a swupgrade
      isa:
      - { exist: false, hi: 1199, lo: 0 }
      - { hi: 27000_99_9, lo: 27000_00_0, choice: [ 0 ] }
      - { hi: 27000_07_9, lo: 27000_00_0, choice: [ [ '0', 'No' ], [ '1', '32 for RG'], [ '32', '32 for Upg'] ], feat: udma_reorder }
      - { hi: 27000_99_9, lo: 27000_08_0, choice: [ [ '0', 'No' ], [ '32', '32'], [ '64', '64'] ], feat: udma_reorder }
      - { hi: 99999, lo: 27100_00_0, choice: [ [ '0', 'No' ], [ '32', '32'], [ '64', '64'] ] }
  - ir_drop_port:
      n: IR Drop Port
      t: ibool
      exprdeps:
      - [ [ 'model:lmem[memName:=instram.0].sizeBytes>0', 'model:lmem[memName:=instram.0].dma>0' ],
          [ 'model:lmem[memName:=dataram.0].sizeBytes>0', 'model:lmem[memName:=dataram.0].dma>0' ],
          [ 'E:IR Drop Port needs inbound DMA on either Inst or Data RAMs' ] ]
      nat: HS
      pgr: 'Activity Ports'
      p: [ ivp2_32, ivp26_32, ivp2c_32, ivp2ce_32 ]
      order: 100
      isa:
      - { hi: 1207, lo: 0, exist: false }
      - { hi: 99999, lo: 1208, feat: ir_drop_port, nofeaturevis: false }
