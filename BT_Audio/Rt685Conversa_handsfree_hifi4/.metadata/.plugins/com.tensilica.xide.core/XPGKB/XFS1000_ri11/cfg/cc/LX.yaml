      - { hi: 99999, lo: 27100_08_0, choice: [ [ 131072, '128K' ], [ 262144, '256K' ], [ 524288, '512K' ], [ 786432, '768K' ], [ 1048576, '1M' ], [ 1310720, '1.25M' ], [ 1572864, '1.5M' ], [ 1835008, '1.75M' ], [ 2097152, '2M' ] ] }
