  implementation:
  - implCgGlobal:
      n: Global Clock Gating
      tt: |-
          Select whether global and functional clock gating should be enabled.
          Please note that RI-2021.7 onwards Global Clock Gating and 
          Functional Unit Clock Gating options both need to be symmetric (both ON/OFF).
      t: ibool
      nat: HV
      pgr: 'Implementation'
      order: 100
      minmax: false
      prodvar: true
      isa:
      - { dv: 1, hi: 99999, lo: 0 }
  - implCgFunctionalUnit:
      n: Functional Unit Clock Gating
      tt: |-
          Select whether clock gating should be enabled at the functional unit level.
          Please note that RI-2021.7 onwards Global Clock Gating controls Functional Unit Clock Gating 
          and both need to be symmetric (both ON/OFF).          
      t: ibool
      nat: HV
      pgr: 'Implementation'
      htmlVisibility: show
      enab: false
      p: { p: 'implCgGlobal', t: [ [ 0, 0 ], [ 1, 1] ] }
      order: 150
      minmax: false
      prodvar: true
      isa:
      - { dv: 1, hi: 99999, lo: 0 }
  - implBlock:
      n: Register file implementation block (Latches are deprecated)
      tt: |-
          Register file implementation block. Note that since processor 
          ISA versions LX3 and Xtensa 8 that latches are now deprecated
      t: str
      nat: HV
      pgr: 'Implementation'
      order: 200
      dv: flop
      minmax: false
      isa:
      - { choice: [ [ 'latch', 'Latches' ], [ 'flop', 'Flip-flops' ] ], dv: latch, hi: 709, lo: 0 }
      - { choice: [ [ 'latch', 'Latches' ], [ 'flop', 'Flip-flops' ] ], dv: flop, hi: 799, lo: 710 }
      - { choice: [ [ 'flop', 'Flip-flops' ], [ 'latch', 'Latches' ] ], dv: flop, hi: 899, lo: 800 }
      - { choice: [ [ 'flop', 'Flip-flops' ], [ 'latch', 'Latches' ] ], dv: flop, feat: latchesCW, hi: 999, lo: 900, nofeaturevis: false }
      - { choice: [ [ 'flop', 'Flip-flops' ], [ 'latch', 'Latches' ] ], dv: flop, feat: latchesNADA, hi: 99999, lo: 1000, nofeaturevis: false }
  - implResetFlops:
      n: Reset All Flops
      tt: |-
          implResetFlops.tooltip
      t: ibool
      nat: HV
      pgr: 'Implementation'
      minmax: false
      prodvar: true
      order: 250
      dv: 1
      isa:
      - { hi: 699, lo: 0, exist: false, dv: 0 }
      - { hi: 799, lo: 700, visible: true, dv: 1 }
      - { hi: 99999, lo: 800, visible: false, dv: 1 }
