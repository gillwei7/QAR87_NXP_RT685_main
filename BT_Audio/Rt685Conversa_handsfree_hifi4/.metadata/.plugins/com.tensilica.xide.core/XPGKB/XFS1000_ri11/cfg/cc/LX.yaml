      evalex:
      - [ [ '${wwdt}>0 && ${wwdt_t1key}==${wwdt_t2key}' ],
          [ 'W:Watchdog timer keys should be different for best detectability(1) (T1KEY/T2KEY)' ] ]   
      - [ [ '${wwdt}>0 && ${wwdt_t1key}==${wwdt_t2key} && strcmp("${wizpage}","rel") && ${bwisanver}>=27100070' ],
          [ 'E:Watchdog timer keys should be different for best detectability (T1KEY/T2KEY)' ] ]                   
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - wwdt_t2key:
      n: WWDT T2KEY
      tt: |-
          Key range: 0 - 0xFFF
      t: int
      nat: HVX
      p: wwdt
      order: 280
      dv: 0x0
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - flexlock:
      n: FlexLock / DCLS
      tt: |-
          "Lock Only" means the 2 cores always run in lockstep (DCLS)
          "Split Lock" means the cores can either run in DCLS or can be split
      t: int
      nat: HV
      bsdeps: { pso.domains: None }
      bcons: [ pifAsync ]
      bdeps2: { '2': [ prid ] }   
      pgr: 'FlexLock'
      order: 100
      dv: 0
      oneof: [ [ perfcounters, traxMemBytes ] ]
      exprdeps:
      - [ [ 'model:int[typeId:=nmi].level>1' ],
          [ 'E:FlexLock selection requires that an NMI interrupt is configured' ] ]
      - [ [ 'model:lmem[memName:=dataport.0].sizeBytes==0' ],
          [ 'E:FlexLock selection requires that an XLMI is not configured' ] ]
      - [ [ '_flexlock_entropy>47' ],
          [ 'W:Low FlexLock key entropy - improve value / bit spread' ] ]
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, choice: [ [ 0, 'Not Available' ] ] }
      - { hi: 99999, lo: 27100_05_0, choice: [ [ 0, 'Not Selected' ], [ 1, 'Lock Only' ], [ 2, 'Split Lock' ] ], feat: flexlockLX }
  - flexlock_mem_lockstep:
      n: FlexLock Memory Lockstep
      tt: |-
          Lock Only mode without Memory Lockstep -> Checker memory is not implemented
          Lock Only mode with Memory Lockstep -> Checker memory is checked
          Split Lock mode without Memory Lockstep -> Checker memory inactive when in lock mode
          Split Lock mode with Memory Lockstep -> Checker memory is checked when in lock mode
      t: ibool
      nat: HV
      p: flexlock
      order: 200
      dv: 0
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0 }
  - flexlock_num_dflops:
      n: FlexLock Num DFLOPs
      t: int
      nat: HV
      p: { p: flexlock, d: 2 }
      order: 220
      dv: 2
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 1, hi: 3 } }
  - flexlock_rkey:
      n: FlexLock RKEY
      tt: |-
          Key range: 0 - 0xFFF      
      t: int
      nat: HVX
      p: flexlock
      order: 230
      dv: 0x0
      evalex:
      - [ [ '${flexlock}>0 && ${flexlock_rkey}==${flexlock_ekey}' ],
          [ 'N:FlexLock keys should be different for best detectability (RKEY/EKEY)' ] ]        
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - flexlock_ekey:
