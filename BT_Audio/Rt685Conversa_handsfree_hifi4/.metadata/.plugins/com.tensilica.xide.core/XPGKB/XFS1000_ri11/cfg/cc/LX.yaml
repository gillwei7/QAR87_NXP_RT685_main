      p: wwdt
      order: 220
      dv: 0x0
      evalex:
      - [ [ '${wwdt}>0 && ${wwdt_rkey}==${wwdt_kkey}' ],
          [ 'N:Watchdog timer keys should be different for best detectability (RKEY/KKEY)' ] ]            
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - wwdt_kkey:
      n: WWDT KKEY
      tt: |-
          Key range: 0 - 0xFFF
      t: int
      nat: HVX
      p: wwdt
      order: 230
      dv: 0x0
      evalex:
      - [ [ '${wwdt}>0 && ${wwdt_kkey}==${wwdt_ekey}' ],
          [ 'N:Watchdog timer keys should be different for best detectability (KKEY/EKEY)' ] ]          
      isa:
      - { exist: false, hi: 27100_04_9, lo: 0 }
      - { hi: 99999, lo: 27100_05_0, range: { lo: 0, hi: 0xFFF } }
  - wwdt_ekey:
      n: WWDT EKEY
      tt: |-
          Key range: 0 - 0xFFF
