      bsdeps2: { '32bit': { mmuType: IMMU } }  
      evalex: 
      - [ [ 'strcmp("${axi_ecc}","64bit") && ${pifWidthBits}<64' ],
          [ 'E: 64-bit <${axi_ecc}> requires that the <${pifWidthBits}> is at least 64 bits' ] ]    
      - [ [ 'strcmp("${wizpage}","rel") && ${bwisanver}<27100070 && (strcmp("${axi_ecc}","none") && ${axi_sec_interface}==1 || strcmp("${axi_ecc}","32bit") && ${axi_sec_interface}==0)' ],
          [ 'E: For this release, <${axi_ecc}> and <${axi_sec_interface}> options should either both be selected, or neither' ] ]                 
      t: str
      nat: HS
      pgr: 'AXI Interface/Bridge Options'
