options:
- pdxnx8:
    exprdeps2:
    - [ [ 'bwisanver>=13000050' ], 
        [ 'P:rel' ],
        [ 'no pdx8 b4 RH.5' ] ]
    - [ [ 'immu_bgmap==mpu_nowndw' ],
        [ 'P:hw' ],
        [ 'E:Hardware builds require PDXNX processors to have Alt MPU BGMap selected.' ] ]        
- fuj6:
    exprdeps2:
    - [ [ 'bwisanver>=28100030' ], 
        [ 'P:rel' ],
        [ 'no fuj6 b4 RI.3' ] ]
- dram_size:
    exprdeps2:
    - [ [ 'dram_size<=524288' ], 
        [ 'dram_size<=16777216', 'visionq6==1' ], 
        [ 'bwisanver>=28100010' ], 
        [ 'P:hw' ],
        [ 'Vision Q is required for HW builds with extended Data RAM size (for decode info)' ] ]
- data_latency:
    exprdeps2:
    - [ [ 'data_latency!=4' ], 
        [ 'data_width>=512' ], 
        [ 'bwisanver>=28100030' ], 
        [ 'P:rel' ],
        [ '3-cycle DSP load/store requires data width of 512 bits for this release' ] ]
    - [ [ 'data_latency!=3' ], 
        [ 'iside_errors==0' ], 
        [ 'dprefetch_entries>0' ],
        [ 'bwisanver<28100030' ],
        [ 'bwisanver>=28100050' ],
        [ 'P:rel' ],
        [ 'E:L1S/L1V with ECC and without Data Prefetch is not supported for this release' ] ]
- l2_size:
    exprdeps2:
    - [ [ 'l2_size==0' ],
        [ 'bwisanver>=28100100' ],
        [ 'P:rel' ],
        [ 'E:<${l2_size}> is not supported for this release' ] ]
- etie_enable:
    exprdeps2:
    - [ [ 'etie_enable==0' ],
        [ 'implasyncreset==1' ],
        [ 'bwisanver>28100050' ],
        [ 'P:rel' ],
        [ 'Selection of <eTIE> requires that <Asynchronous Reset> is selected for this release.' ] ]
- sys_mif_data_apb:
    exprdeps2:
    - [ [ 'sys_mif_data_apb==0' ],
        [ 'sdc_size==0' ],
        [ 'sdc_ways!=2' ],
        [ 'bwisanver>=28100070' ],
        [ 'P:rel' ],
        [ 'E:APB Manager port together with 2-way scalar data cache is not supported in this release' ] ]
- l2_numcores:        
    exprdeps2:
    - [ [ 'l2_numcores==1' ],
        [ 'bwisanver>28100050' ],
        [ 'P:rel' ],
        [ 'E:Multi core processors are not supported for this release, please select a different release.' ] ]
- idma_reorderbuf_burst:
    evalex2: 
    - [ [ 'strcmp("${wizpage}","rel") && ${idma_reorderbuf_burst}==8 && ${bwisanver}==28100081' ],
        [ 'W:RI.2021.8.1 is a special release, your config does not have any options selected that matches this release. Please try submitting to other releases.' ] ]
- scatgat:
    exprdeps2:
    - [ [ 'scatgat==0' ],
        [ 'idma==0', 'sys_sif_data_width==0' ],
        [ 'bwisanver!=28100060' ],
        [ 'hw_rtl!=Production' ],
        [ 'P:hw' ],
        [ 'E:Production builds of Scatter Gather with iDMA or Data inbound are only supported in RI-2021.7 and later releases.' ] ]
- sys_mif_inst_width:
    exprdeps2:
    - [ [ 'F:!aprilfools' ],
        [ 'bwisanver!=28100091' ], 
        [ 'visionq8==1', 'l2_numcores==1' ],
        [ 'P:rel' ],
        [ 'E:Only single-core Vision Q8 is supported with this release' ] ]
    - [ [ 'F:aprilfools' ], 
        [ 'bwisanver!=28100091' ], 
        [ 'visionq8==1' ],
        [ 'P:rel' ],
        [ 'W:Note that customers will only be allowed to build VQ8 on RI.9.1, you can deviate because of aprilfools!' ] ]
    - [ [ 'bwisanver!=28100091' ], 
        [ 'wwdt==0' ],
        [ 'P:rel' ],
        [ 'E:<${wwdt}> is not supported in this release.' ] ]     
    - [ [ 'bwisanver!=28100091' ], 
        [ 'flexlock==0' ],
        [ 'P:rel' ],
        [ 'E:<${flexlock}> is not supported in this release.' ] ]        
    - [ [ 'bwisanver!=28100091' ], 
        [ 'iside_errors==0', 'dside_errors==0' ],
        [ 'P:rel' ],
        [ 'E:Memory errors are not supported in this release.' ] ]
- idma_buf_depth:        
    exprdeps2:
    - [ [ 'idma==0' ],
        [ 'idma_buf_depth!=0' ],
        [ 'bwrelnver==14000091' ], 
        [ 'bwrelnver>14000100', 'bwrelnver<15000000' ],
        [ 'buildtype!=10' ],
        [ 'P:rel' ],
        [ 'E:This config cannot be software upgraded to this release.' ] ]        
- commonrules:
    exprdeps2:
    - [ [ 'F:aprilfools' ],
        [ 'P:rel' ],
        [ 'W:Your account has the "aprilfools" feature enabled. You might be building a RESTRICTED CONFIG!!' ] ]
    - [ [ 'F:!aprilfools' ],
        [ 'bwisanver!=28200000' ], 
        [ 'P:rel' ],
        [ 'E:NX builds are not supported on this release' ] ]     
    evalex2:         
    - [ [ 'F:!aprilfools' ],
        [ 'strcmp("${wizpage}","rel") && ${bwisanver}==28100110 && ${buildtype}!=10' ],
        [ 'strcmp("${wizpage}","rel") && ${bwisanver}==28100110 && ${buildtype}==10' ],
        [ 'E:Only software upgrade builds are supported on this release.' ] ]