# the below options serve as a meaning default untill the option actually is defined.
# Meaning controller.getmodel.getItem() api can be used to get their default values.
# ConfigModelExpander will elaborate these values in the substitutor MAP
# But these are not persisted and hence will never appear in the xc or dbapi or the DB.

defaults: 
   NX: { tempPipeLength: 10 }
   LX: { }
   X: { }
   
option_isa_map:
    isa_seq: 'LX~NX~RNX'
    option_key_seq: {
        prid: 'prid~params:IsaUsePrid~prid',
        vectorsReloc: 'vectorsReloc~params:RelocatableVectors~params:RelocatableVectors',
        
        # I cache map
        ic.size: 'ic.size~ic_size~ic_size',
        ic.ways: 'ic.ways~params:InstCacheWayCount~ic_ways',
        ic.lineSize: 'ic.lineSize~params:InstCacheLineBytes~ic_linesize',
        ic.locking: 'ic.locking~params:InstCacheIndexLock~NA',
        
        # D cache map
        dc.size: 'dc.size~sdc_size~sdc_size',
        dc.ways: 'dc.ways~params:L1SCacheWayCount~sdc_ways',
        dc.lineSize: 'dc.lineSize~params:L1SCacheLineBytes~sdc_linesize',
        dc.locking: 'dc.locking~params:L1SCacheLock~params:L1SCacheLock',
        dc.writeBack: 'dc.writeBack~params:L1SCacheWriteback~params:L1SCacheWriteback',
        
        # Vector D Cache - Only NX for now
        vdc_size: 'NA~vdc_size~NA',
        VECTOR_D_CACHE_WAYS: 'NA~params:VECTOR_D_CACHE_WAYS~NA',
        L1VCacheLineBytes: 'NA~params:L1VCacheLineBytes~NA',
        L1VCacheLock: 'NA~params:L1VCacheLock~NA',
        L1VCacheWriteback: 'NA~params:L1VCacheWriteback~NA',
        
        # Interrupts map
        intCount: 'intCount~params:InterruptCount~params:InterruptCount',
        intLevelCount: 'intLevelCount~ints_max_level~ints_max_level',
        intTimerCount: 'intTimerCount~ints_timer_count~ints_timer_count',
        
        # LSU
        loadStoreUnits: 'loadStoreUnits~params:LoadStoreUnitsCount~loadStoreUnits',
        
        # sys and local mem mapping
        dataram.0: 'dataram.0~dram~dram',
        dataram.1: 'dataram.1~dram~dram',
        instram.0: 'instram.0~iram~iram',
        instram.1: 'instram.1~iram~iram',
        instrom.0: 'instrom.0~irom~irom',
        
        sysram: 'sysram~sram~sram',
        sysram.0: 'sysram.0~sram~sram',
        sysram.1: 'sysram.1~sram~sram',
        
        sysrom: 'sysrom~srom~srom',
        sysrom.0: 'sysrom.0~srom~srom',
        sysrom.1: 'sysrom.1~srom~srom',
        
        mmuType: 'mmuType~mmuchoice~NA',
        immu_noofmpuentries: 'immu_noofmpuentries~immu_fgentries~NA'
        
        
      }
