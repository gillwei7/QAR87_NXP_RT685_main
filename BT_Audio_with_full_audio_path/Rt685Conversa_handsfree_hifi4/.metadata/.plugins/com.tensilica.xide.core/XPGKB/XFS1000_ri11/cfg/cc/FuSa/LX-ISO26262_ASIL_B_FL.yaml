# this file has rules specific to ISO-26262 ASILB when DCLS is not lock only and lock step is off
# basically when FL is selected then memory errors can either be none or ecc (not parity)
    
options:                                              
  - fusa_iso26262:
      bsdeps: { instMemErrorType: '0:2', dataMemErrorType: '0:2' }   
      exprdeps:
      - [ [ 'prefetchEntries==0' ],
          [ 'prefetch_memerror==0' ],
          [ 'prefetch_memerror==2' ],
          [ 'E:Selection of <DCLS with Lock Only + Lockstep> requires that <Prefetch Memory Error type> is either None or ECC' ] ]                                                        
                                                             
                                                                         