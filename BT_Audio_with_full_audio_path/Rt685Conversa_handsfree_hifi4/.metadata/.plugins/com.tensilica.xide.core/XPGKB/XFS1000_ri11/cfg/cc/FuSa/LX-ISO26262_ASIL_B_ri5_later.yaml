# this file has rules specific FuSa ISO 26262 ASILB for RI.5 and later releases
# basically this files says that if no FL and ASILB and RI.5 and later release then memory errors need to be ECC.
    
options:
  - _dcls_without_lockonly_lockstep:
      bsdeps: { instMemErrorType: 2, dataMemErrorType: 2,  dataMemErrorWidth: 4 } 
      evalex:
      - [ [ '${address_err}==0 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080' ],
          [ 'E:Selection of <${fusa_iso26262}> requires that <${address_err}> is selected for this release.' ] ]          
      exprdeps:
      - [ [ 'prefetchEntries==0' ],
          [ 'prefetch_memerror==2' ],
          [ 'E:Selection of <FuSa> requires that <Prefetch Memory Error type> is ECC' ] ]                                               
  - fusa_iso26262:
      bdeps: [ 'csr_parity~2' ]
  
                                                                
                                                                         