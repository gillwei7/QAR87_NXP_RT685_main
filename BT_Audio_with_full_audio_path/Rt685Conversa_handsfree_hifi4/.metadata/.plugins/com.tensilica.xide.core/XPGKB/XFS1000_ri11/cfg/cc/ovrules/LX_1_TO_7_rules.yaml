# this file contains rules that apply for LX 1-7 but not on LX8. Basically these are rules on options 
# that became un-configurable in LX8

options:        
  - udma:
      bdeps: [ pif.arb.byte.enable ]  
      evalex: 
      - [ [ '${udma_bufferwidth}!=4 && ${sg_scatter}==1' ],
          [ 'E:<${sg_scatter}> with <${udma}> requires that <${udma_bufferwidth}> is 4' ] ]   
      - [ [ '${udma_outstanding_rows}<16 && ${sg_scatter}==1' ],
          [ 'E:<${sg_scatter}> with <${udma}> requires the <${udma_outstanding_rows}> to be at least 16' ] ]      
  - axi_acelite:
      bdeps: [ pifver_32 ]    
  - extMemAttributes:
      bdeps: [ pifver_32 ]     
  - secure_mode:
      bdeps: [ +pifver_32 ] 
  - activityPort: 
      bdeps: [ perfcounters ]                              
