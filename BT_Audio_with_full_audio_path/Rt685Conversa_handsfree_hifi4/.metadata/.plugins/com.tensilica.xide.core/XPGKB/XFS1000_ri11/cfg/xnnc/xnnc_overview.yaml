# yaml that controls the xnnc overview tab

sections:
  - { n: actions, u_name: 'Actions' , desc: 'Click on the links below to view related content in the XNNC results view'}
  - { n: results, u_name: 'Results', desc: 'Click on the links below to view various results generated by this run' }
  - { n: files, u_name: 'Files', desc: 'Click on the links below to view files' }
  - { n: run_logs, u_name: 'Simulation Logs', desc: 'Right-Click on the log files below to see compare/view options , Double-Click to view the log' }

rdata_map:
  - { hi: '99999', lo: '2.0.0', specs: [ 'xnnc-classification-results.spec', 'xnnc-segmentation-results.spec' , 'xnnc-detection-results.spec' ] } 
  
launch_map :
  - {coretype : "nna.*" , launch : MP}
  - {coretype : "dna.*" , launch : MP}
  - {coretype : "dsp.*" , launch : ISS}

section_controls:
  - import_xws:
      n: Import XWS
      text: '<a>Import XWS</a>: Import the XWS generated by Gen Code stage for this run.'
      type: link
      open_with: xws        # default is output view, other options are editor or browser or xws for import xws
      file: { path: output, pattern: '([a-zA-Z_\_\d]+[\.]?(xws))' } # path is the path relative to run directory, patterns is the patterns to match
      section: actions
  - save_xws:
      n: Save XWS
      text: '<a>Save XWS</a>: Save the XWS generated by Gen Code stage to an external location.'
      type: link
      open_with: save   
      file: { path: output, pattern: '([a-zA-Z_\_\d]+[\.]?(xws))' } 
      section: actions      
 # - delete_run:
 #     text: '<a>Delete Run</a>: Deletes this run.'
 #     type: link
 #     section: actions      
  - output:
      n: XNNC Logs
      text: '<a>XNNC Logs</a>: View the console output/logs that were generated for this XNNC run.'
      type: link
      file: { path: 'output.log' } 
      section: results
  - cfg:
      n: XNNC Configuration
      text: '<a>Cfg</a>: View the CFG for this run.'
      type: link
      open_with: editor        
      file: { pattern: '([a-zA-Z_\_\d]+[\.]?(cfg))' } 
      section: files
  - fixedpt_profile:
      n: Fixed Point Profile
      text: '<a>Fixed Point Profile</a>: View the Fixed point profile result for this run.'
      type: link    
      file: { path: 'output/FixedPoint_Results.txt' }    
      section: results      
  - fixedpt_profile:
      n: Fixed Point Profile
      text: '<a>Fixed Point Profile</a>: View the Fixed point profile result for this run.'
      type: link    
      file: { path: 'output/FixedPointTest_Results.txt' }    
      section: results      
  - float_results:
      n: Float Results
      text: '<a>Float Results</a>: View the Float results for this run.'
      type: link    
      file: { path: 'output/Float_Results.txt' }    
      section: results        
  - best_profile:
      n: Best Profile
      text: '<a>Best Profile</a>: View the best profile result for this run.'
      type: link    
      file: { path: 'temp/BestProfile.txt' }    
      section: results
  - select_best_profile:
      n: Select Best Profile
      text: '<a>Select Best Profile </a>: Select the best quantization profile manually'
      type: link   
      open_with : prof_selector
      file: { path: 'output/FixedPoint_Results.txt'}    
      section: results
 # - calib_images:
 #     text: '<a>Calibration Images</a>: View the images used for calibration.'
 #     type: link    
 #     file: { path: temp, pattern: '([a-zA-Z_\_\d]+(calib)[\.]?(txt))' }    
 #     section: files  
  - output_ctrl:
      n: Output Control
      text: '<a>Output Control</a>: View the output control for this run.'
      type: link    
      file: { path: output, pattern: '([a-zA-Z_\_\d]+[\.]?(octrl))' }    
      section: files
  - run_images:
      n: Images
      text: '<a>Runs Images</a>: View the images used during this run.'
      type: link    
      file: { path: temp, pattern: '((tmp)[a-zA-Z_\_\d]+[\.]?(txt))' }    
      open_with: op_link
      section: files   
  - imported_projects:
      n: Imported Projects
      text: 'Following executable project(s) were imported for this run...'
      type: custom 
      section: actions     
  - profiled_projects:
      n: Profiled Projects
      text: 'Profile Data Set is available for following project(s)...'
      type: custom 
      section: actions      
  - float_vs_fixed_pt:
      n: Float vs Fixed Pt profile
      text: '<a>Compare Profile Results</a> Graphically compare between the generated profile results.'
      file: { path: output, pattern: '((FixedPoint_Results.txt)|(Float_Results.txt))' }  
      type: link 
      open_with: graph
      section: results
  - simulation_logs:
      n: Simulation Logs
      text: 'Following are the Simulation Logs for the Project'
      type: custom 
      section: run_logs    
