# this file has rules specific to ISO-26262 ASILB when DCLS is not lock only and lock step is off
# the general ASILB memory rules, i.e. memory errors should be ecc or parity.
    
options:        
  - dc.size:
      bdeps: [ dc.memErr ]     
  - ic.size:
      bdeps: [ ic.memErr ]        
  - prefetchEntries:
      bsdeps: { prefetch_memerror: '1:2' }                                          
  - fusa_iso26262:
      bsdeps: { instMemErrorType: '1:2', dataMemErrorType: '1:2' }
      exprdeps:
      - [ [ 'model:lmem[memName:=instram.0].sizeBytes==0' ],
          [ 'model:lmem[memName:=instram.0].memError>0' ],
          [ 'E: Selection of <FuSa> requires that <Instruction RAM Memory Error> is selected' ] ]   
      - [ [ 'model:lmem[memName:=dataram.0].sizeBytes==0' ],
          [ 'model:lmem[memName:=dataram.0].memError>0' ],
          [ 'E: Selection of <FuSa> requires that <Data RAM Memory Error> is selected' ] ]                                                         
                                                             
                                                                         