options:
- sw_clibs:
    exprdeps2:
    - [ [ 'sw_clibs==xclib' ],
        [ 'sw_clibs==newlib' ],
        [ 'bwrelnver<13000000', 'sw_clibs==uclibc' ],
        [ 'bwrelnver<13000000', 'sw_clibs==uclibcNoFP' ],
        [ 'P:sw' ],
        [ 'E:Uclibc is no longer supported(2)' ] ]
- cx_bsp3:
    exprdeps2:
    - [ [ 'bwrelnver<14000000' ],
        [ 'P:rel' ],
        [ 'E:Software upgrade of ConnX BSP3 is not supported with this release' ] ]
- cx_bben_ivp32:
    exprdeps2:
    - [ [ 'bwrelnver<14000000' ],
        [ 'P:rel' ],
        [ 'E:Software upgrade of IVP32 is not supported with this release' ] ]
- ivpep_sac:
    exprdeps2:
    - [ [ 'bwrelnver<14000000' ],
        [ 'P:rel' ],
        [ 'E:Software upgrade of IVPEP is not supported with this release' ] ]
- vectra2:
    exprdeps2:
    - [ [ 'bwrelnver<14000000' ],
        [ 'P:rel' ],
        [ 'E:Software upgrade of Vectra LX is not supported with this release' ] ]
- udma_outstanding_rows:
    exprdeps2:
    - [ [ 'bwrelnver>12000040', 'bwisanver>12000040' ],
        [ 'udma_outstanding_rows<=16' ],
        [ 'P:rel' ],
        [ 'E:iDMA row count cannot exceed 16 for this release' ] ]
- instWidthBytes:
    exprdeps2:
    - [ [ 'bwrelnver>12000040', 'bwisanver>27000040' ],
        [ 'instWidthBytes<=16' ],
        [ 'P:rel' ],
        [ 'E:Max Instruction Width bytes cannot exceed 16 for this release' ] ]
- xnne_num_sblks:
    exprdeps2:
    - [ [ 'bwisanver>=27100020' ],
        [ 'P:rel' ],
        [ 'E:DNA100 is not supported for this release' ] ]
    - [ [ 'hw_rtl!=Production' ],
        [ 'P:hw' ],
        [ 'E:Production builds of DNA100 are not supported for this release' ] ]
    - [ [ 'bwisanver<27100030' ],
        [ 'P:rel' ],
        [ 'E:This release only supports SW upgrades of DNA100' ] ]
- nna_engine:
    exprdeps2:
    - [ [ 'nna_engine==0' ],
        [ 'nna_engine!=10' ],
        [ 'bwisanver<27100070' ],
        [ 'P:rel' ],
        [ 'E:This release supports only software upgrades of DNA150 builds' ] ]
    - [ [ 'nna_engine==0' ],
        [ 'visionp1==0' ],
        [ 'bwisanver>=27100070' ],
        [ 'P:rel' ],
        [ 'E:<Vision P1> + <NNA> is not supported for this release' ] ]  
    - [ [ 'nna_engine==0' ],
        [ 'axi_ecc==none' ],
        [ 'bwisanver>=27100081' ],
        [ 'P:rel' ],        
        [ 'E:Selection of <${nna_engine}> with <${axi_ecc}> is not supported on this release.' ] ]                
    - [ [ 'F:!aprilfools' ], # feature permits internal submit
        [ 'nna_engine==0' ],
        [ 'bwisanver<27100090' ],
        [ 'P:rel' ],
        [ 'E:New NNA Engine processor builds are not supported with this release (SW upgrade is OK)' ] ]
- nne_engine:
    exprdeps2:     
    - [ [ 'hifi_le==0', 'hifi3z==0' ],
        [ 'bwisanver>=27100090' ],
        [ 'P:rel' ],
        [ 'E:<NNE110> + <${hifi_le}> or <${hifi3z}> DSP is not supported on this release.' ] ]           
    - [ [ 'F:!aprilfools' ],
        [ 'nne_engine==0' ],
        [ 'bwisanver<=27100090' ],
        [ 'P:rel' ],
        [ 'E:<NNE110> is not supported on this release.' ] ]                           
- dataMemErrorWidth:
    exprdeps2:
    - [ [ 'F:!wide_ecc_xlmi' ], # for people who have the special feature 
        [ 'dataMemErrorWidth!=4' ],
        [ 'model:lmem[memName:=dataport.0].sizeBytes==0' ],   
        [ 'E:The selection of <Data Memory Error Width> of value <4> is incompatible with <XLMI port>' ] ]  
    - [ [ 'dataMemErrorWidth!=4' ], # RI.9 onwards this is a 100% block
        [ 'model:lmem[memName:=dataport.0].sizeBytes==0' ],
        [ 'bwisanver<27100090' ],
        [ 'P:rel' ],      
        [ 'E:For this release, selection of <Data Memory Error Width> of value <4> is incompatible with <XLMI port>' ] ]           
- vpu_poolq:
    exprdeps2: 
    - [ [ 'bwisanver>=27100010', 'bwisanver<27100030' ],
        [ 'P:rel' ],
        [ 'E:The RI-2019.3 release only supports SW upgrades of DNA100 and 7C0 at this point' ] ]
- etie_enable:
    exprdeps2:
    - [ [ 'etie_enable==0' ], 
        [ 'implasyncreset==1' ], 
        [ 'bwisanver>27100050' ], 
        [ 'P:rel' ],
        [ 'Selection of <eTIE> requires that <Asynchronous Reset> is selected for this release.' ] ]
- prefetchToL1:
    evalex2: 
    - [ [ 'strcmp("${wizpage}","rel") && ${bwisanver}<27100080' ],
        [ 'W:You have selected <${prefetchToL1}> option exposed to Erratum 616. We recommend using RI-2021.8 or a newer release to build such cores.' ] ]
- implCgGlobal:
#    exprdeps2:
#    - [ [ 'implCgGlobal==$implCgFunctionalUnit' ], 
#        [ 'bwisanver<27100070' ], 
#        [ 'P:rel' ],
#        [ 'E:<Global Clock Gating> and <Functional Unit Clock Gating> are required to be symmetric for this release.(both ON/OFF)' ] ]
    evalex2: 
    - [ [ '${implCgGlobal}!=${implCgFunctionalUnit} && strcmp("${wizpage}","rel") && ${bwisanver}>=27100070' ],
          [ 'E:<${implCgGlobal}> and <${implCgFunctionalUnit}> are required to be symmetric for this release.(both ON/OFF)' ] ]
- fpmlx_128:
    exprdeps2:
    - [ [ 'fpmlx_128==0' ], 
        [ 'fusa_iso26262==1' ], 
        [ 'bwisanver>27100050' ], 
        [ 'P:rel' ],
        [ 'E:<KP1> cannot be built on this release, please use RI-2021.6+.' ] ]
    - [ [ 'fpmlx_128==0' ], 
        [ 'fusa_iso26262==0' ], 
        [ 'bwisanver!=27100050' ],
        [ 'hw_rtl!=Production' ], 
        [ 'P:hw' ],
        [ 'E:Production (FuSa) builds of <KP1> are not supported for this release, please try Eval.' ] ]
- cache_test_ops:
    evalex2: 
    - [ [ '${dc.size}>0 && ${prefetch_memerror}>${dataMemErrorType} && ${dataMemErrorType}==0 && strcmp("${wizpage}","rel") && ${bwisanver}>=27100080' ],
        [ 'E:For this release, <${cache_test_ops}> requires that when <${dataMemErrorType}> is none, <${prefetch_memerror}> is also none.' ] ]
    - [ [ '${dc.size}>0 && ${prefetch_memerror}>${dataMemErrorType} && ${dataMemErrorType}==1 && strcmp("${wizpage}","rel") && ${bwisanver}>=27100080' ],
        [ 'E:For this release, <${cache_test_ops}> requires that when <${dataMemErrorType}> is parity, <${prefetch_memerror}> is either none or parity.' ] ]
- vp1_vecreggroup:
    evalex2: 
    - [ [ 'strcmp("${wizpage}","rel") && ${vp1_vecreggroup}==0 && ${nna_engine}==0 && ${bwisanver}==27100081' ],
        [ 'W:RI.2021.8.1 is a special release, your config does not have any options selected that matches this release. Please try submitting to other releases.' ] ]
- pso.core.ret:
    exprdeps2:
    - [ [ 'pso.core.ret!=Partial' ],
        [ 'bwisanver<27100080' ], 
        [ 'P:rel' ],
        [ 'E:<Partial Core Retention> is not supported for the selected release.' ] ]
- dc.size:
    exprdeps2:
    - [ [ 'prefetchEntries==0', ],
        [ 'dc.lineSize>$pifWidthBits/8' ],
        [ 'E:DC line size must be larger than pif width when configured with prefetch' ] ]
- xnne2_mem_error:
    evalex2: 
    - [ [ '${nna_engine}>0 && ${xnne2_mem_error}==0 && ${instMemErrorType}!=0' ],
        [ 'E:Selection of <${instMemErrorType}> requires that <${xnne2_mem_error}> is also selected.' ] ]  
    - [ [ '${nna_engine}>0 && ${xnne2_mem_error}==0 && ${dataMemErrorType}!=0' ],
        [ 'E:Selection of <${dataMemErrorType}> requires that <${xnne2_mem_error}> is also selected.' ] ]    
- flexlock:
    evalex2: 
    - [ [ 'strcmp("${wizpage}","rel") && ${bwisanver}>=27100080 && ${flexlock}==1 && strcmp("${tempBus}","ahblite")' ],
        [ 'E:AHB-Lite with <${flexlock}> in "Lock-only" mode is not supported in this release.' ] ]                    
- commonrules:
    evalex2: 
    - [ [ '${hifi_le}>0 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080' ],
        [ 'E:Builds of configurations with <${hifi_le}> is supported in RI-2021.8 release and later.' ] ]  
    - [ [ '${hifi_le}>0 && ${buildtype}==10 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080 && ${bwrelnver}>=14000080' ],
        [ 'E:Software Upgrade for configurations with <${hifi_le}> built using RI-2021.7 and older releases is not supported in RI-2021.8 and later releases.' ] ]
    - [ [ '${visionp1}>0 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080' ],
        [ 'E:Builds of configurations with <${visionp1}> is supported in RI-2021.8 release and later.' ] ]  
    - [ [ '${visionp1}>0 && ${buildtype}==10 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080 && ${bwrelnver}>=14000080' ],
        [ 'E:Software Upgrade for configurations with <${visionp1}> built using RI-2021.7 and older releases is not supported in RI-2021.8 and later releases.' ] ]
    - [ [ '${fpmlx_128}>0 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080' ],
        [ 'E:Builds of configurations with <${fpmlx_128}> is supported in RI-2021.8 release and later.' ] ]  
    - [ [ '${fpmlx_128}>0 && ${buildtype}==10 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080 && ${bwrelnver}>=14000080' ],
        [ 'E:Software Upgrade for configurations with <${fpmlx_128}> built using RI-2021.7 and older releases is not supported in RI-2021.8 and later releases.' ] ]
    - [ [ '${fpmlx_512}>0 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080' ],
        [ 'E:Builds of configurations with <${fpmlx_512}> is supported in RI-2021.8 release and later.' ] ]  
    - [ [ '${fpmlx_512}>0 && ${buildtype}==10 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080 && ${bwrelnver}>=14000080' ],
        [ 'E:Software Upgrade for configurations with <${fpmlx_512}> built using RI-2021.7 and older releases is not supported in RI-2021.8 and later releases.' ] ]
    - [ [ '${pdx4b_fpm128}>0 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080' ],
        [ 'E:Builds of configurations with <${pdx4b_fpm128}> is supported in RI-2021.8 release and later.' ] ]  
    - [ [ '${pdx4b_fpm128}>0 && ${buildtype}==10 && strcmp("${wizpage}","rel") && ${bwisanver}<27100080 && ${bwrelnver}>=14000080' ],
        [ 'E:Software Upgrade for configurations with <${pdx4b_fpm128}> built using RI-2021.7 release is not supported in RI-2021.8 and later releases.' ] ]     
    - [ [ 'F:!aprilfools' ],
        [ 'strcmp("${wizpage}","rel") && ${bwisanver}==27100110 && ${buildtype}!=10' ],
        [ 'strcmp("${wizpage}","rel") && ${bwisanver}==27100110 && ${buildtype}==10' ],
        [ 'E:Only software upgrade builds are supported on this release.' ] ]
    - [ [ '${hifi4}==0 && ${hifi4_vector_fp}==1' ],
        [ 'E:<${hifi4_vector_fp}> requires that its parent <${hifi4}> is selected.' ] ]
    exprdeps2: 
    - [ [ 'bwrelnver>12000050', 'bwisanver>27000050' ],
        [ 'model:lmem[memName:=datarom.0].numBanks<2' ],
        [ 'P:rel' ],
        [ 'E:Data ROM with multiple banks is not supported with this release' ] ]
    - [ [ 'bwisanver!=27000110' ],
        [ 'bwrelnver<13000000' ],
        [ 'bwrelnver>14000000' ],
        [ 'P:rel' ],
        [ 'E:Software upgrade of RG.11 builds to RH(all) and RI.0 release is not supported.' ] ]
    - [ [ 'hw_version!=LX7.0.11' ],
        [ 'bwrelnver<13000000' ],
        [ 'bwrelnver>14000000' ],
        [ 'P:rel' ],
        [ 'E:Software upgrade of RG.11 builds to RH(all) and RI.0 release is not supported.' ] ]
    - [ [ 'bwisanver!=27000120' ],
        [ 'bwrelnver<13000000' ],
        [ 'bwrelnver>14000000' ],
        [ 'P:rel' ],
        [ 'E:Software upgrade of RG.12 builds to RH(all) and RI.0 release is not supported.' ] ]
    - [ [ 'hw_version!=LX7.0.12' ],
        [ 'bwrelnver<13000000' ],
        [ 'bwrelnver>14000000' ],
        [ 'P:rel' ],
        [ 'E:Software upgrade of RG.12 builds to RH(all) and RI.0 release is not supported.' ] ]
    - [ [ 'bwisanver!=27100000' ],
        [ 'P:rel' ],
        [ 'model:smem[memName:=sysram.0].pAddrEnd<4294967295'],
        [ 'E:RI-2018.0 requires that system ram should not hit the 4G boundary. Please reduce system ram or select another release.' ] ]
    - [ [ 'xnne2_num_sblks!=2' ], 
        [ 'hw_rtl!=Production' ], 
        [ 'P:hw' ],
        [ 'E:Production builds of <DNA150 Dual SBLK with Comparator> are currently not supported(try eval)' ] ]
    - [ [ 'F:aprilfools' ], 
        [ 'P:rel' ],
        [ 'W:Your account has the "aprilfools" feature enabled. You might be building a RESTRICTED CONFIG!!' ] ]      
    - [ [ 'F:aprilfools' ], 
        [ 'bwisanver!=27100091' ], 
        [ 'P:rel' ],
        [ 'W:Note that customers will not be allowed to build LX on RI.9.1, you can because of aprilfools!' ] ]       
    - [ [ 'F:!aprilfools' ], 
        [ 'bwisanver!=27100091' ], 
        [ 'P:rel' ],
        [ 'E:LX builds cannot be submitted to this release.' ] ]         