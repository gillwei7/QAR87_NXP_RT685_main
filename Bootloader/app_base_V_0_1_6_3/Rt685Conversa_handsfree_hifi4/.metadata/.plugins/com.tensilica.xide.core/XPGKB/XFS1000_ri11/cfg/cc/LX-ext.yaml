# the below options serve as additional ISA extensions to the original ISA lines in the <fam>.yaml file.
# these just get appended to the existing isa line is XOD. Currently used to rename the LX8 coprocs and kill coprocs

isa_extensions: 
#
# ***************************these procs/options are no longer allowed LX8 onwards*********************
# note tilde '~' is used to separate mutiple options in case they have common isa moving forward. in general each option could be a separate line with its own isa. (but that would be just duplication of isa lines)
  - 'connx~hifi2_40~cx_bbep32~cx_bbep64~cx_bbep8~cx_bbep16~pdx~pdx4b~pdx8~xnne_num_sblks~nna_engine~nne_engine~ivp2ce_32':
      isa:
      - { feat: nosuchfeature, hi: 99999, lo: 29000_00_0, nofeaturevis: false }  
# safety features, controlling by mayfools      
  - 'flexlock~wwdt':
      isa:
      - { feat: mayfools, hi: 99999, lo: 29000_00_0, nofeaturevis: false }        
#      
#
# ******************************the name changes LX8 onwards********************************* 
#
# FloatingPoint KP1/KP6 name changes
  - fpmlx_128: 
      isa:
      - { feat: lx_fpm105, hi: 99999, lo: 29000_00_0, n: MathX 110 }  
  - fpmlx_512: 
      isa:
      - { feat: lx_fpm120, hi: 99999, lo: 29000_00_0, n: MathX 130 }  
  - fpmlx_vecregs: 
      isa:       
      - { n: MathX Vector Registers, hi: 99999, lo: 29000_00_0, visible: true, rangepo2: { hi: 5, inczero: false, lo: 4 }, dv: 32  }
  - fpmlx_spvfp:  
      isa:      
      - { n: MathX Single Precision VFP, hi: 99999, lo: 29000_00_0, choice: [ [ 0, 'None' ], [ 1, 'Single Precision VFP' ], [ 2, 'Extended Single Precision VFP' ] ] }
  - fpmlx_hpvfp:    
      isa:    
      - { n: MathX Half Single Precision VFP, hi: 99999, lo: 29000_00_0, choice: [ [ 0, 'None' ], [ 1, 'Half Precision VFP' ], [ 2, 'Extended Half Precision VFP' ] ] }
  - fpmlx_dpvfp:   
      isa:     
      - { n: MathX Double Single Precision VFP, hi: 99999, lo: 29000_00_0, choice: [ [ 0, 'None' ], [ 1, 'Double Precision VFP' ], [ 2, 'Extended Double Precision VFP' ] ] }
  - fpmlx_dpvfp_addsub: 
      isa:
      - { hi: 99999, lo: 29000_00_0, n: MathX DP VFP Add/Sub }
#
# Options that had PIF keyword in them
  - wbEntries: 
      isa:
      - { hi: 99999, lo: 29000_00_0, n: Count of write buffer entries }
  - dmaDepth: 
      isa:
      - { hi: 99999, lo: 29000_00_0, n: Inbound request buffer depth }
  - pifWriteResp: 
      isa:
      - { hi: 99999, lo: 29000_00_0, n: System interface write responses }
  - pifWidthBits: 
      isa:
      - { hi: 99999, lo: 29000_00_0, n: Width of processor interface }
  - pif.crit.word.first: 
      isa:
      - { hi: 99999, lo: 29000_00_0, n: Critical word first }
