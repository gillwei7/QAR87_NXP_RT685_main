        - { hi: '99999', lo: '2.4.0' , choice : [.png, .ppm, .npy, .np], e : '"${image_list_type}" == "Calibration List" || "${image_list_type}" == "Validation List"'}
        - { hi: '99999', lo: '2.4.0' , choice : [.ppm, .npy, .np], e : '"${image_list_type}" == "Test Inference List" || "${image_list_type}" == "Test Classification List"'}
        - { hi: '99999', lo: '2.0.0' , choice : [.png , .ppm , .npy, .np]}
    - selection_scheme:
        n: Selection Scheme
        t: choice
        tooltip : Select the selection scheme
        version:
        - { hi: '99999', lo: '2.0.0' , choice : [Select First , Select Last , Select even ones , Select odd ones , Select All] } 
    - num_images:
        n: No. of Images
        t: int
        tooltip : Select the number of images
        version:
        - { hi: '99999', lo: '2.0.0'} 
    - props:
        title : Create Image list
        can_proceed : ["'\"${image_list_name}\" != \"\" && \"${image_dir}\" != \"\" && \"${image_format}\" != \"\" && \"${selection_scheme}\" != \"\" && \"${num_images}\" != \"\" && ${num_images} > 0'>wiz8"] 
