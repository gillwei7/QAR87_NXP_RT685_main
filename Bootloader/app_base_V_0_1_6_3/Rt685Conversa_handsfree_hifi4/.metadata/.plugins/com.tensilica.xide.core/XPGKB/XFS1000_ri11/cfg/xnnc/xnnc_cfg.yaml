#xnnc output control attributes. This is for UI elements.
#For file and browse controls, there are two attributes which should be compulsorily provided.
#1.1 u_nettype refers to the network types(Classification,Segmentation,Detection etc) for which the attribute should be disabled. 
#1.2 If the attribute is supported for all types of networks, then this field should be  none
#2.1 u_netmodel refers to the network model (e.g ONNX,Tensorflow,Caffe etc) for which the attribute should be enabled.
#2.2 If the attribtue is to be enable for all, this field should be all.
outputattributes:
  - saveOption:
      u_name: Save actions                                  #UI name to be displayed
      u_type: choice                                        #type, the different types will be chkButton,str,chkBoxTableViewer, browse
      u_seq: 1                                              #Sequence in which the attribute will appear.
      u_nettype: none                                       #Network type for which the option should be disabled   
      u_row: 1
      u_tooltip: Save action that will be used to generate metrics.
      version: 
      - { hi: '99999', lo: '2.0.0', 
      choice: ['save top1_5:classification:all',
      'save SegStats:segmentation:all', 'save psnr:segmentation:all', 'save l1:segmentation:all', 'save l2:segmentation:all',
      'save voc_det_AP:detection:all', 'save coco_det_AP:detection:all', 'save coco_mask_AP:detection:all', 
      'save TextMetric:all:all','TextMetric:all:all','save xinferPP:all:tensorflow', 'save:all:all', 'save squad1_qa:all:all', 'save squad2_qa:all:all' , 'save xoutputPP:all:all']}    
  - num_classes:
      u_name: Number of Classes
      u_type: choice
      u_seq: 4
      u_nettype: Classification,Segmentation
      u_row: 2
      u_tooltip: You must select one of the values when COCO datasets is chosen.
      version:
      - { hi: '99999', lo: '2.0.0', choice: ['91','80'] } 
  - output_tensors:
      u_name: Output nodes
      u_type: list
      u_seq: 13
      u_row: 3
      u_tooltip: Output nodes name.
      version: 
      - { hi: '99999', lo: '2.0.0' }
  - labels_file:
      u_name: Labels/Annotation/dataset file
      u_type: file
      u_seq: 11
      u_nettype: none
      u_netmodel: all
      u_row: 4
      u_tooltip: Labels file for classification, segmentation or object detection classes. Provide the relevant dataset json file in case of SQuAD datasets.
      dialogattribs : {dialogkey: labels_file, filterextensions: ['*.txt', '*.pb', '*.json', '*.yaml'], pathVariableName: LABEL_FILE_LOC}
      version: 
      - { hi: '99999', lo: '2.0.0' }
  - annotation_dir:
      u_name: Annotations directory
      u_type: browse
      u_seq: 21
      u_nettype: Classification,Segmentation
      u_netmodel: all
      u_row: 5
      u_tooltip: Directory where .xml files are located for corresponding image with the same name
      dialogattribs : {dialogkey: anno_dir, pathVariableName: ANNOTATION_DIR_LOC}
      version: 
      - { hi: '99999', lo: '2.0.0' }
  - model_file:
      u_name: Model File
      u_type: file
      u_seq: 21
      u_netmodel: tensorflow
      u_nettype: none
      u_row: 6
      u_tooltip: Model file which will be used with xinferPP. If not provided, the model provided in the config file is used.
      dialogattribs : {dialogkey: tensorflow_model, filterextensions: ['*.pb'], pathVariableName: MODEL_FILE_LOC}
      version: 
      - { hi: '99999', lo: '2.2.0' }
  - vocab_file:
      u_name: Vocabulary File
      u_type: file
      u_seq: 11
      u_nettype: none
      u_netmodel: all
      u_row: 7
      u_tooltip: Vocabulary file to be used with squad save actions.
      dialogattribs : {key: vocab_file, filterextensions: ['*.txt'], pathVariableName: LABEL_FILE_LOC} 
      version: 
      - { hi: '99999', lo: '2.3.0' }
  - extra_args:
      u_name: Extra Args
      u_type: str
      u_seq: 21
      u_row: 8
      u_tooltip: Provide additional parameters required by some detection networks here.
      version: 
      - { hi: '99999', lo: '2.0.0' }   

# xnnc cfg attributes that are defined in the cfg file.
attributes:
  path:                  # section
  - input_dir:           # attribute internal name
      n: Input Directory # attribute UI name
      t: dir             # type, different types are: dir, file, choice, int, str, mlt (multi line text)
      uistage: general     # the stage from above to which this attribute belongs to
      order: 10          # the order in which this attribute will appear in UI
      xcfg : false
      scope: f           # default is f, allowed values are f, s, o (f = full i.e. mandatory, s = mandatory for stage, o = optional) 
      version:           # the version on xnnc in which this arrtibute existed , hi: 99999 means till end of time
      - { hi: '99999', lo: '2.0.0' }
  - output_dir:
      n: Output Directory
      t: dir
      uistage: general
      order: 20
      xcfg : false
      version:
      - { hi: '99999', lo: '2.0.0' }   
  - tmp_dir:
      n: Temp Directory
      t: dir
      uistage: general
      order: 30
      xcfg : false
      version:
      - { hi: '99999', lo: '2.0.0' }  
  - image_dir:
      n: Image list dir
      t: dir
      uistage: general
      wiz: false
      order: 31
      xcfg : false
      version:
      - { hi: '99999', lo: '2.0.0' }     
  - custom_op_lib_path:
      n: Custom Library Path
      t: dir
      uistage: general
      order: 32
      xcfg : false
      scope : o
      version:
      - { hi: '99999', lo: '2.0.0' }         
  network:               # section
  - class:
      n: Network type
      t: choice
      uistage: general
      wiz: true
      order: 40
      xcfg : false
      dv: Classification
      version:
      - { hi: '99999', lo: '2.0.0', choice: [ 'Classification', 'Segmentation', 'Detection' ] }
  - name:
      n: Name
      t: str
      uistage: general
      wiz: false
      order: 40
      xcfg: false
      scope: o
      tooltip : The name to be used for xws generation
      version:
      - { hi: '99999', lo: '2.0.0' }
  - type:
      n: Input model type
      t: choice
      uistage: gen_quant
      dv: ONNX
      deps2: { Caffe2: [ network-input_graph, network-input_model ], Tensorflow: [ network-input_model ] }
      cons2: { ONNX: [ network-input_graph ], Tensorflow: [ network-input_graph ] , Pytorch : [network-input_graph]}         
      bsdeps2: {  ONNX: { network-input_data_layout: NHWC }, Caffe2: { network-input_data_layout: NCHW } }
      order: 41
      xcfg : false
      version:
      - { hi: '2.3.1', lo: '2.0.0', choice: [ 'ONNX', 'Caffe2', 'Tensorflow' ] }
      - { hi: '99999', lo: '2.4.0', choice: [ 'ONNX', 'Caffe2', 'Tensorflow' , 'Pytorch'] }
  - input_graph:
      n: Input Graph
      t: str
      read_only : true
      uistage: general
      scope: o
      order: 50
      helpId : U_Xnnc_Editor_input_graph
      disable: { network-type: [ONNX , Tensorflow , Pytorch]}
      tooltip : init_net.pb for Caffe2 networks. No files other than .pbtxt and .pb to be present for Caffe2 in graph and model directories
      version:
      - { hi: '99999', lo: '2.0.0' }   
  - input_model:
      n: Input Model
      t: str
      read_only : true
      uistage: general
      helpId : U_Xnnc_Editor_input_model
      wiz: true
      order: 60
      tooltip : For ONNX network a .onnx file , for Caffe2 predict_net.pb, for Tensorflow a .pb file , for PyTorch a .pth file and for TFlite a .tflite file.
      version:
      - { hi: '99999', lo: '2.0.0' }  
  - input_node_name:
      n: Input Node Name
      t: multi
      uistage: general
      order: 61
      table : input_args
      helpId : U_Xnnc_Editor_input_node_name
      tooltip : Input Node Name
      multi_attrs :
      - { cntrl : text , widget_count : 1  , secondary_sep: "," , loVersion : '2.3.0' , hiVersion : '99999' , type: str}
      version:
      - { hi: '99999', lo: '2.0.0' }  
  - input_data_layout:
      n: Input Data Layout
      t: multi
      uistage: general
      dv: NHWC
      table : input_args
      order: 62
      helpId : U_Xnnc_Editor_input_data_layout #temporary
      tooltip : Default for ONNX->NHWC , Caffe2->NCHW
      multi_attrs :
      - { cntrl : combo , widget_count : 1  , secondary_sep: "," , loVersion : '2.3.0' , hiVersion : '99999' , type : str}
      bsdeps2: {  NHWC: { network-type: ONNX }, NCHW: { network-type: Caffe2 } }
      version:
      - { hi: '2.2.0', lo: '2.0.0', choice: [ 'NHWC', 'NCHW', 'RGB', 'BGR' ] }
      - { hi: '99999', lo: '2.3.0', choice: [ 'NHWC', 'NCHW', 'RGB', 'BGR' , 'NonImage'] }                     
