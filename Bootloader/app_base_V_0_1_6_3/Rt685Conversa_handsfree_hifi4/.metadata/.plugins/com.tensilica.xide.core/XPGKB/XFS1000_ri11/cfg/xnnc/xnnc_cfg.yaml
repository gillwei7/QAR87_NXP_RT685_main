        t: choice
        enable : 'true'
        uc: true  #update choices before navigating to this page 
        tooltip: Specify image extension
        version:
        - { hi: '2.0.0', lo: '2.0.0' , choice : [.png], e : '"${image_list_type}" == "Calibration List" || "${image_list_type}" == "Validation List"'}
        - { hi: '2.0.0', lo: '2.0.0' , choice : [.ppm], e : '"${image_list_type}" == "Test Inference List" || "${image_list_type}" == "Test Classification List"'}
