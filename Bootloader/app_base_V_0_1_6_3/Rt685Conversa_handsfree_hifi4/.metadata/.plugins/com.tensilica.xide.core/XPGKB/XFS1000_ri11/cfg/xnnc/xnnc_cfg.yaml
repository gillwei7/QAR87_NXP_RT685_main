# $ -> AND , ^ -> XOR , | -> OR , ~ -> NOT , + -> NEEDS 
# type is either error or warning
custom_rules:
  - {stage : compression , rules: [grp-pruning^grp-clustering , sec-pruning|sec-clustering] , type : 'error'}
  - {group : MultiCore , rules: [attr-xtensa_core_type~=dna150] , type : 'error'}
  - {group : pruning , rules: [~grp-clustering] , type : 'warning'}
  - {group : clustering , rules: [~grp-pruning] , type : 'warning'}    
