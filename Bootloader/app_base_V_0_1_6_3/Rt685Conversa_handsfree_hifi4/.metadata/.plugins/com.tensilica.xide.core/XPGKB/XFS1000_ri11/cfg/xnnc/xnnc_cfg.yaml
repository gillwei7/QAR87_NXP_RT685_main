      dv: NHWC
      order: 63
      scope : o
      helpId : U_Xnnc_Editor_input_data_layout #temporary
      tooltip : For XNNC VERSION 2.1 Onwards|Input Files Layout is an optional parameter.|The setting specifies inputs (by their position in input_node_name list) to which newlayouts apply.|If the setting for an input differs from input_data_layout, the input tensor is transposed.|Default value is the value of input_data_layout.
      version:
      - { hi: '99999', lo: '2.1.0' }                    
  - model_type:
      n: Model Type
