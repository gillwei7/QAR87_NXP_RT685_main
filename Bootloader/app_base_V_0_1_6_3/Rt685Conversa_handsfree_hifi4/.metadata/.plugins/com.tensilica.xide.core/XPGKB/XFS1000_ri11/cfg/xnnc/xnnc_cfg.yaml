# XNNC cfg config model definition as per 1.x cfg description, not sure what 2.0 adds/removes

# Various xnnc stages, the sequence in which they need to be run and their UI name.
#DO NOT CHANGE STAGE SEQUENCES MENTIONED BELOW.
#A stage which has an enable switch should define metaN , shortN , version and result
stages:
  - { n: general, seq: -1, u_name: 'General Properties' , groups: ['Stage_Args'], version: { hi: '99999', lo: '2.0.0'}}
  - { n: convt, seq: 100, u_name: 'TensorFlow2ONNX', switch: { en: conv_tf , disExpr : 'false' , disDef : false} , result: {directory : 'temp' , start : '' , end : '.onnx'} , metaN: 'Conv TF->ONNX' , shortN: 'CONV', version: { hi: '99999', lo: '2.0.0'}}
  - { n: convtorch, seq: 150, u_name: 'Convert Pytorch', switch: { en: conv_torch , disExpr : '"${network-type}" != "Pytorch" && "${network-type}" != "pytorch"' , disDef : true} , result: {directory : 'temp' , start : '' , end : '.onnx'} , metaN: 'Conv Torch' , shortN: 'CONV_TORCH', version: { hi: '99999', lo: '2.5.0'}}
  - { n: compression, seq: 200, u_name: 'Compression Arguments', groups: ['pruning' , 'clustering'] , switch: { en: compression, disExpr : '"${network-model_type}" == "quantized" || "${network-model_type}" == "Quantized"' , disDef : false} , metaN : 'Compression',result: {directory : 'temp/clustering|temp/pruning' , start : ' | ' , end : '.onnx|.onnx'} , metaN : 'Compression' , shortN : 'CPR',  version: { hi: '99999', lo: '2.1.0'}}
  - { n: gen_quant, seq: 300 , u_name: 'Quantization Profiles',groups : ['Quantization_Args'], switch: { en: gen_quant_profile, disExpr : '"${network-model_type}" == "quantized" || "${network-model_type}" == "Quantized"' , disDef : false} , result: {directory : 'temp' , start : 'ProfileList' , end : '.txt'} , metaN : 'Gen Quant' , shortN : 'GQ', version: { hi: '99999', lo: '2.0.0'}}
  - { n: use_quant, seq: 500 , u_name: 'Use Quantization Profiles', switch: { en: use_quant_profile , disExpr : '"${network-model_type}" == "quantized" || "${network-model_type}" == "Quantized"' , disDef : false}, needs_seq: ['300'] , result: {directory : 'output' , start : 'FixedPoint_Results' , end : '.txt'} , metaN : 'Use Quant' , shortN : 'UQ', version: { hi: '99999', lo: '2.0.0'}}
  - { n: test_best_profile, seq: 525 , u_name: 'Test Best Profile', switch: { en: test_best_profile, disExpr : '"${network-model_type}" != "quantized" && "${network-model_type}" != "Quantized"' , disDef : true} , result: {directory : 'output' , start : 'FixedPointTest_Results' , end : '.txt'} , metaN : 'Test Best Profile' , shortN : 'TBF', version: { hi: '99999', lo: '2.3.0'}}
  - { n: gen_code, seq: 600, u_name: 'Code Generation Properties', groups : ['Compression_Args' , 'Graph_Args' ] ,switch: { en: gen_code}, needs_seq: ['500|525']  , result: {directory : 'output' , start : '' , end : '.xws'} , metaN : 'Gen Code' , shortN : 'GC', version: { hi: '99999', lo: '2.0.0'}}
  - { n: flt_inference, seq: 400, u_name: 'Floating Point Inference', independent : true ,switch: { en: flt_inference, disExpr : '"${network-model_type}" == "quantized" || "${network-model_type}" == "Quantized"' , disDef : false} , result: {directory : 'output' , start : 'Float_Results' , end : '.txt'} , metaN : 'FLT Inference' , shortN : 'FLT', version: { hi: '99999', lo: '2.0.0'}}
  - { n: xtensa_args, seq: -1, u_name: 'Xtensa Arguments' , groups : ['MultiCore'], version: { hi: '99999', lo: '2.0.0'}}
  - { n: stage_args, seq: -1, u_name: 'Stage Specific Arguments', version: { hi: '99999', lo: '2.0.0'}}
  - { n: network_args, seq: -1, u_name: 'Network Specific Arguments', groups : ['custom_args','Yolo_Args','torch_quant'], version: { hi: '99999', lo: '2.1.0'}}

allstages:
  - { seq: '300;400;500;600' , version: { hi: '99999', lo: '2.0.0'} , expr : '"${network-model_type}" != "quantized" && "${network-model_type}" != "Quantized"' , def : true}
  - { seq: '525;600' , version: { hi: '99999', lo: '2.3.0'} , expr : '"${network-model_type}" == "quantized" || "${network-model_type}" == "Quantized"' , def : false}

pages : 
  - { n : pg1 , u_name : 'General Properties' , sections: [general , convt]}
  - { n : pg2 , u_name : 'Quantization' , sections: [gen_quant , use_quant]}
  - { n : pg3 , u_name : 'Xtensa Arguments' , sections: [xtensa_args]}
  - { n : pg4 , u_name : 'Code Generation ' , sections: [gen_code]}
  - { n : pg5 , u_name : 'Pruning/Clustering' , sections: [compression]}
  - { n : pg6 , u_name : 'Network Specific Arguments' , sections: [network_args]}
   
# these are the co-procs which are allowed with xnnc.  
xnnc_coprocs: [ 'ivp26_32', 'ivp2c_32', 'visionq6,l2_numcores~1', 'visionq7', 'visionq8', 'visionp1' ]
#sample of full supported syntax for above, allows operators like ! , ~ : (not comma tilde colon)
#xnnc_coprocs: [ 'ivp26_32', 'ivp2c_32', 'visionq6,l2_numcores~1', '!visionq7,l2_numcores~2:4', '!visionq6' ]


# these are the internal XX names of xnnc dsps and their names in XNNC land.
#the old style, to keep customers without patch happy
xnnc_dsp: { xnne_num_sblks : dna100 , xnne2_num_sblks : dna150 , visionq8 : dsp_vq8 , visionp1 : dsp_vp1}  
# the new style (with expression handling), this was patched and hence the above  xnnc_dsp needs to exist
xnnc_dsp2: { '${xnne_num_sblks}>0' : dna100 ,
             '${nna_engine} == 20 && ${visionp1} > 0' : nna1_vp1,
             '${nna_engine} == 20' : nna1,
             '${visionq8}>0' : dsp_vq8,
             '${visionp1}>0': dsp_vp1,
             '${xnne2_num_sblks}>0' : dna150,
             '${nna_engine} == 10' : dna150 }  

#To draft message from error log , add just pattern and keep msg as empty
xnnc_error_pattern : 
  - { pattern : 'nnc: error:', msg : ''}
  - { pattern : "Path doesn't exist", msg : ''}
  - { pattern : 'Config file error' , msg : 'Run Failed due to error in config file'}
  - { pattern : 'xnnc.py: error:' , msg: ''}
  - { pattern : 'ImportError: No module named' , msg: 'Run Failed as some python module was not found'}
  - { pattern : 'ValueError:' , msg: ''}
  - { pattern : 'ImportError: DLL load failed' , msg: 'Run Failed as dll load failed'}
  - { pattern : 'incorrect usage. Job not submitted' , msg: 'Could not process python incantation' }
  - { pattern : 'ERROR:' , msg : ''}
  - { pattern : 'SyntaxError: invalid syntax', msg: 'Wrong python used or arguments to xnnc.py does not satisfy the requirements'}
  - { pattern : 'INFO: BestProfile cannot be selected automatically' , msg : 'Please select best profile manually'}
  - { pattern : 'The filename, directory name, or volume label syntax is incorrect.' , msg : 'The filename, directory name, or volume label syntax is incorrect. Try removing quotes when file name or directory name is specified  as part of argument.'}
  - { pattern : 'XNNC compilation completed with errors' , msg : ''}

groups:
  - { n: Stage_Args , u_name : 'Stage Arguments' , type : check , checkName: 'Set Stage Arguments'}
  - { n: Compression_Args , u_name : 'Compression Arguments' , type : check , checkName : 'Set Compression Arguments'}
  - { n: Graph_Args , u_name : 'Graph Arguments' , type : check , checkName : 'Set Graph Arguments'}
  - { n: MultiCore  , u_name : 'Multicore Arguments' , type : check , checkName : 'Use MultiCore'}
  - { n: pruning , u_name : 'Pruning' , type : check , checkName : 'Enable Pruning'} 
  - { n: clustering , u_name : 'Clustering' , type : check , checkName : 'Enable Clustering'}
  - { n: Quantization_Args, u_name: 'Accuracy Tuning', type: check, checkName: 'Set Accuracy Tuning Arguments'}
  - { n: custom_args, u_name: 'Custom Arguments', type: check, checkName: 'Set Custom Layer Arguments'}
  - { n: Yolo_Args, u_name: 'Yolo Arguments', type: check, checkName: 'Set Yolo Specific Arguments'} 
  - { n: torch_quant, u_name: 'Pytorch Quant', type: check, checkName: 'Set Pytorch Quantization Arguments'} 

  
tables: 
  - { n: input_args , uName : 'Input Node Arguments' , uiSection : general , helpId : U_Xnnc_Editor_table_1}
  - { n: test_infer_args , uName : 'Test Inference Args' , uiSection : network_args , helpId : U_Xnnc_Editor_table_2}

#Config restrictions - These are restrictions on the config used for code generation
#Make sure that the restrictions are added in the same way. 
#The condition 'cond' can have multiple conditions seperated by || or && or a combination of both.
#The err_msg can be of type Error/Warning/Info. Use prefix err: / warn: / info: before msg for type.
   

config_restrictions: 
    LX : 
      - {
          xnnc_ver: '0-2.2',
          cond: '${visionp1} == 1',
          msg: 'err: This version of XNNC does not support Vision P1, please use XNNC 2.3.0+'
        }   
      - {
          xnnc_ver: '0-2.3',
          cond: '${nna_engine} == 20',
          msg: 'err: This version of XNNC does not support NNA110, please use XNNC 2.3.1+'
        }
      - {
          xnnc_ver: '2.4-2.4',
          cond: '${visionp1} == 1 && "${hw_version}"=="LX7.1.8"',
          msg: 'err: VisionP1 configuration builds from the RI-2021.8 release requires that XNNC v2.4.1 or later is used.'
        }
      - {
          xnnc_ver: '2.4-2.4',
          cond: '${ivp26_32} == 1 && "${hw_version}"=="LX7.1.8"',
          msg: 'err: VisionP6 configuration builds from the RI-2021.8 release requires that XNNC v2.4.1 or later is used.'
        }                   
    NX :         
      - {
          xnnc_ver: '0-2.1',
          cond: '${idma_channels} != 2',
          msg: 'err:NX configs with <iDMA channels> = 1 or 4 is not supported by XNNC version 2.1 and below, please use XNNC 2.2+'
        }
      - {
          xnnc_ver: '0-2.2',
          cond: '${visionq8} == 1',
          msg: 'err: This version of XNNC does not support Vision Q8, please use XNNC 2.3+'
        }
      - {
          xnnc_ver: '0-2.2',
          cond: '${l2_numcores} > 1',
          msg: 'err: This version of XNNC does not support multi-core configurations, please use XNNC 2.3+'
        }
      
image_list_wizards:
  wiz1:
    - image_list_type:
        n: Image Lists
        t: list
        tooltip: Select the type of imagelists
        version:
        - { hi: '99999', lo: '2.0.0' , choice : ['Calibration List' , 'Validation List' , 'Test Inference List' , 'Test Classification List' ], e: '"${network_class}" == "Classification"'}
        - { hi: '99999', lo: '2.0.0' , choice : ['Calibration List' , 'Validation List' , 'Test Inference List']} 
    - props:
        title : Image list types
        desc : Select the type of image list
        can_proceed : [ "\"${network_class}\" == \"Segmentation\">wiz7" , "\"${network_class}\" == \"Detection\">wiz3" , "\"${network_class}\" == \"Classification\">wiz2"]
        can_finish : [ "false" ]
        validation: 
        - {
            cond : "\"${image_list_type}\" == \"\" ",
            msg : "err:Image list type cannot be empty"
          }
  wiz2:
    - data_category:
        n: Image Data Set is categorized
        t: check
        tooltip : Is Image data categorized
        version:
        - { hi: '99999', lo: '2.0.0'} 
    - image_set_dir:
        n: Image data set directory
        t: dir
        enable : '${data_category} == true'
        tooltip: Directory to categorized image data
        version:
        - { hi: '99999', lo: '2.0.0'} 
    - props:
        title : Image dataset information
        can_proceed : ["'${data_category} == false && \"${image_list_type}\" != \"Test Inference List\"'>wiz3", "'${data_category} == false' && \"${image_list_type}\" == \"Test Inference List\" >wiz6" , "'${data_category} == true && \"${image_set_dir}\" != \"\" && \"${image_list_type}\" != \"Test Inference List\"'>wiz4" , "'${data_category} == true && \"${image_set_dir}\" != \"\" && \"${image_list_type}\" == \"Test Inference List\"'>wiz5"] 
        can_finish : ["false"]
        validation: 
        - {
            cond : "\"${data_category}\" == true && \"${image_set_dir}\" == \"\"",
            msg : "err:Please specify image dataset directory"
          }        
  wiz3:
    - image_list_name:
        n: Image List Name
        t: str
        tooltip : Name of the imagelist
        version:
        - { hi: '99999', lo: '2.0.0'} 
    - image_dir:
        n: Image Directory
        t: dir
        tooltip: Specify image directory
        version:
        - { hi: '99999', lo: '2.0.0'} 
    - image_format:
