      order: 62
      helpId : U_Xnnc_Editor_output_data_layout
      tooltip : The default value is NCHW which is the blob dump format in XNNC .|Networks like tf_SRCNN NHWC is recommended.
      version:
      - { hi: '99999', lo: '2.0.0', choice: [ 'NHWC', 'NCHW', 'RGB', 'BGR' ] }                    
  - input_files_layout:
      n: Input Files Layout
